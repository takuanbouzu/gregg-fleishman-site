<script>
(function(){
  "use strict";
  var root = null, currentPortrait = null;
  function isPortrait(){
    return window.matchMedia('(max-aspect-ratio: 1/1)').matches;
  }
  // Choose the layout-appropriate component: the design ships a portrait
  // build (1080x1920) alongside the landscape one (1920x1080). Mounting the
  // landscape component on a phone letterboxes it into a tiny center strip.
  function render(){
    var el = document.getElementById('lt-root');
    if (!el || !window.React || !window.ReactDOM || !window.LostTriangleVideo) return false;
    var portrait = isPortrait() && !!window.LostTriangleVideoPortrait;
    var Comp = portrait ? window.LostTriangleVideoPortrait : window.LostTriangleVideo;
    if (!root) { el.innerHTML = ''; root = ReactDOM.createRoot(el); }
    currentPortrait = portrait;
    root.render(React.createElement(Comp));
    return true;
  }
  if (!render()) {
    // Scripts may still be evaluating; poll briefly until globals are ready.
    var tries = 0;
    var id = setInterval(function(){
      if (render() || ++tries > 200) clearInterval(id);
    }, 30);
  }
  // Re-pick the component when the aspect ratio crosses square (rotate /
  // resize). The Stage persists the playhead per-orientation, so carry it
  // across the switch for continuity.
  var rt;
  window.addEventListener('resize', function(){
    clearTimeout(rt);
    rt = setTimeout(function(){
      if (root && isPortrait() !== currentPortrait) {
        try {
          var from = currentPortrait ? 'losttri_portrait:t' : 'losttri_landscape:t';
          var to   = currentPortrait ? 'losttri_landscape:t' : 'losttri_portrait:t';
          var v = localStorage.getItem(from);
          if (v != null) localStorage.setItem(to, v);
        } catch (e) {}
        render();
      }
    }, 150);
  });
})();
</script>
