<style>
  *{box-sizing:border-box;}

  #lt-stage{

  /* The React <Stage> mounts here and fills the box (position:absolute inset:0). */
  #lt-root{ position:absolute; inset:0; }

  /* Embed mode — no nav, stage owns the whole frame. */
  html.lt-embed #gfnav{ display:none; }

  .lt-scrub{ -webkit-appearance:none; appearance:none; height:4px; border-radius:3px; background:rgba(240,237,232,.14); outline:none; }

  .lt-scrub::-moz-range-thumb{ width:15px; height:15px; border:none; border-radius:50%; background:#C8A96E; cursor:pointer; }

<!-- The Lost Triangle motion graphic — single self-contained React component
     (plain React.createElement, no build step). Defines window.LostTriangleAnimation. -->
<script src="assets/lost-triangle/lost-triangle-animation.js"></script>
<script>
(function(){
  "use strict";
  var root = null;
  // The design is one 1920x1080 component that scales to fit its box (it
  // letterboxes on portrait, exactly as the original export does).
  function render(){
    var el = document.getElementById('lt-root');
    if (!el || !window.React || !window.ReactDOM || !window.LostTriangleAnimation) return false;
    if (!root) { el.innerHTML = ''; root = ReactDOM.createRoot(el); }
    root.render(React.createElement(window.LostTriangleAnimation, { autoplay: true }));
    return true;
  }
  if (!render()) {
    // Scripts may still be evaluating; poll briefly until globals are ready.
    var tries = 0;
    var id = setInterval(function(){
      if (render() || ++tries > 200) clearInterval(id);
    }, 30);
  }
})();
</script>
