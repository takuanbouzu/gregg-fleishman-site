<!-- Main container -->
<div id="ct-root" style="position:fixed; inset:0; top:56px; background:#0B0B0B; overflow:hidden; font-family:'Space Grotesk',sans-serif;">
  <!-- Stage -->
  <div id="ct-stage" style="position:absolute; left:50%; top:50%; width:1920px; height:1080px; transform:translate(-50%,-50%); transform-origin:center center; background:radial-gradient(ellipse 72% 64% at 50% 44%,#16140F 0%,#0E0E0D 54%,#0B0B0B 100%); box-shadow:0 30px 80px rgba(0,0,0,.6);">
    <svg id="ct-svg" viewBox="0 0 1920 1080" width="100%" height="100%" role="img" style="position:absolute;inset:0;display:block;"></svg>
  </div>

  <!-- Clip switcher (fixed top center) -->
  <div id="ct-clips" style="position:fixed; top:max(72px,calc(56px + 16px)); left:50%; transform:translateX(-50%) scale(1); transform-origin:top center; display:flex; gap:6px; padding:6px; background:rgba(18,18,18,.85); backdrop-filter:blur(12px); border:1px solid rgba(240,237,232,.07); border-radius:12px; box-shadow:0 8px 26px rgba(0,0,0,.4); z-index:10;"></div>

  <!-- Playback bar (fixed bottom) -->
  <div id="ct-bar" style="position:fixed; bottom:max(16px,env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%) scale(1); transform-origin:bottom center; display:flex; align-items:center; gap:8px; padding:8px 14px; background:rgba(18,18,18,.85); backdrop-filter:blur(12px); border:1px solid rgba(240,237,232,.07); border-radius:14px; box-shadow:0 12px 34px rgba(0,0,0,.5); max-width:96vw; z-index:10;"></div>
</div>

<script>
(function(){
  var END = 12, KEY = 'lt_optb_dark';
  var r2 = Math.SQRT2;
  var V = [
    {v:[r2,1,1], az:35.264, alt:30, run:'√3', rise:'1', tri:'30-60-90 · 1:√3:2', angT:'60°', hl:'o', note:'= Lost Triangle small angle'},
    {v:[1,1,r2], az:45,     alt:45, run:'√2', rise:'√2', tri:'45-45-90 · 1:1:√2', angT:'45°', hl:'b', note:'= bisector of the two LT angles'},
    {v:[1,r2,1], az:54.736, alt:30, run:'√3', rise:'1', tri:'30-60-90 · 1:√3:2', angT:'60°', hl:'v', note:'= Lost Triangle large angle'}
  ];
  var ACC = ['#7FB2E6','#C8A96E','#E0349E'];
  var ANGS = ['35.26°','45°','54.74°'];
  var PHASES = [
    {t:0,   label:'Ground'},
    {t:1.3, label:'Azimuth'},
    {t:3.4, label:'Rise'},
    {t:5.4, label:'Triangle'},
    {t:7,   label:'Lengths'},
    {t:8.6, label:'Key'}
  ];

  // State
  var state = { t:0, playing:false, clip:0, vw:window.innerWidth };

  // Restore from localStorage
  try {
    var saved = JSON.parse(localStorage.getItem(KEY));
    if (saved && typeof saved.t === 'number' && saved.t > 0 && saved.t < END) {
      state.t = saved.t;
      if (saved.clip != null) state.clip = saved.clip;
    } else {
      state.playing = true;
    }
  } catch(e) { state.playing = true; }

  function save(t, clip) {
    try { localStorage.setItem(KEY, JSON.stringify({t:t, clip:clip})); } catch(e){}
  }

  // DOM refs
  var stage = document.getElementById('ct-stage');
  var svg = document.getElementById('ct-svg');
  var clipsEl = document.getElementById('ct-clips');
  var barEl = document.getElementById('ct-bar');

  // --- SVG helpers (shared) ---
  function defs() {
    return '<defs><filter id="g" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>';
  }
  function A(o){ var s=''; for(var k in o){ if(o[k]!=null) s+=' '+k+'="'+o[k]+'"'; } return s; }
  function es(x){ return (''+x).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
  function rawln(a,b,c,w,dash,op){ return '<line'+A({x1:a[0],y1:a[1],x2:b[0],y2:b[1],stroke:c,'stroke-width':w,'stroke-linecap':'round','stroke-dasharray':dash||null,opacity:op==null?null:op})+'/>'; }
  function lnXY(a,b,c,w,prog,dash,op){ if(prog<=0)return''; var e=[a[0]+(b[0]-a[0])*prog,a[1]+(b[1]-a[1])*prog]; return rawln(a,e,c,w,dash,op); }
  function fam(mono){ return mono?"'Space Mono',monospace":"'Cormorant Garamond',serif"; }
  function txXY(x,y,s,c,sz,wt,anc,mono){ return '<text'+A({x:x,y:y,fill:c,'font-size':sz,'font-weight':wt||(mono?'400':'600'),'font-style':mono?'normal':'italic','font-family':fam(mono),'text-anchor':anc||'middle'})+'>'+es(s)+'</text>'; }
  function pl(pts,c,w,op){ return '<polyline'+A({points:pts.map(function(P){return P[0].toFixed(1)+','+P[1].toFixed(1);}).join(' '),fill:'none',stroke:c,'stroke-width':w,'stroke-linecap':'round',opacity:op})+'/>'; }
  function sm(tt,a,b){ if(b<=a)return tt>=b?1:0; var e=(tt-a)/(b-a); e=e<0?0:e>1?1:e; return e*e*(3-2*e); }

  // --- buildScene ---
  function buildScene(Vd, t, acc) {
    var el=22*Math.PI/180, PCX=960, PCY=540, PS=200;
    var AZ=-0.6+0.14*t;
    var INK='#F0EDE8', MUT='#8A8480', GMUT='rgba(240,237,232,0.4)';
    var L1='#4A90D9', L2='#C8A96E', L3='#3CCB8E', L2u='#F0EDE8';
    var ANG='#C8A96E', ANGT='#D8BE8F';
    var LC={'1':L1,'√2':L2,'√3':L3,'2':L2u};
    function proj(p){ var ce=Math.cos(AZ),se=Math.sin(AZ); var xa=p[0]*ce-p[1]*se,ya=p[0]*se+p[1]*ce,za=p[2]; var zb=ya*Math.sin(el)+za*Math.cos(el); return [PCX+xa*PS,PCY-zb*PS]; }
    function seg(p0,p1,prog,c,w,dash,op){ return lnXY(proj(p0),proj(p1),c,w,prog,dash,op); }
    function dot(p,r,c,op){ if(op<=0)return''; var P=proj(p); return '<circle'+A({cx:P[0],cy:P[1],r:r,fill:c,opacity:op})+'/>'; }
    function poly(ps,fill,op){ return '<polygon'+A({points:ps.map(function(p){var P=proj(p);return P[0].toFixed(1)+','+P[1].toFixed(1);}).join(' '),fill:fill,stroke:'none',opacity:op})+'/>'; }
    function tx(p,dx,dy,s,c,sz,wt,mono){ if(!p)return''; var P=proj(p); return '<text'+A({x:P[0]+dx,y:P[1]+dy,fill:c,'font-size':sz,'font-weight':wt||(mono?'400':'600'),'font-style':mono?'normal':'italic','font-family':fam(mono),'text-anchor':'middle'})+'>'+es(s)+'</text>'; }
    function mid(a,b){ return [(a[0]+b[0])/2,(a[1]+b[1])/2,(a[2]+b[2])/2]; }
    function rang(O3,A3,B3,c,op){ if(op<=0)return''; var D=proj(O3),Aa=proj(A3),Bb=proj(B3); var v1=[Aa[0]-D[0],Aa[1]-D[1]],v2=[Bb[0]-D[0],Bb[1]-D[1]]; var n1=Math.hypot(v1[0],v1[1])||1,n2=Math.hypot(v2[0],v2[1])||1; var s2=30,a=[D[0]+v1[0]/n1*s2,D[1]+v1[1]/n1*s2]; var b=[D[0]+v2[0]/n2*s2,D[1]+v2[1]/n2*s2]; var cc=[a[0]+v2[0]/n2*s2,a[1]+v2[1]/n2*s2]; return '<path'+A({d:'M '+a[0]+' '+a[1]+' L '+cc[0]+' '+cc[1]+' L '+b[0]+' '+b[1],fill:'none',stroke:c,'stroke-width':3.5,opacity:op})+'/>'; }
    function azArc(azRad,r,prog,c,op){ var pts=[],n=20; for(var i=0;i<=n;i++){ var f=azRad*prog*i/n; pts.push(proj([r*Math.cos(f),r*Math.sin(f),0])); } return pl(pts,c,5.5,op); }
    function altArc(fh,altRad,r,prog,c,op){ var pts=[],n=18; for(var i=0;i<=n;i++){ var th=altRad*prog*i/n; pts.push(proj([r*Math.cos(th)*fh[0],r*Math.cos(th)*fh[1],r*Math.sin(th)])); } return pl(pts,c,5,op); }
    function ground(g){ var s2=poly([[-2.2,-2.2,0],[2.2,-2.2,0],[2.2,2.2,0],[-2.2,2.2,0]],'rgba(240,237,232,0.03)',g*0.9);
      s2+=seg([0,0,0],[2.4,0,0],g,'rgba(240,237,232,0.22)',3)+seg([0,0,0],[0,2.4,0],g,'rgba(240,237,232,0.22)',3);
      s2+=tx([2.4,0,0],20,10,'x',MUT,30,'400',true)+tx([0,2.4,0],-25,5,'y',MUT,30,'400',true);
      s2+=seg([0,0,0],[0,0,2.2],g,'rgba(240,237,232,0.25)',2.5,'4 5')+tx([0,0,2.2],-15,-20,'z',MUT,30,'400',true);
      s2+=tx([-1.45,1.6,0],0,0,'xy-plane',MUT,24,'400',true); return s2; }
    function drawLT(ox,oy,w,hl,tt){ var Gb=[ox+w,oy],Go=[ox,oy],Gv=[ox+w,oy-w*0.7071]; var s2='';
      s2+='<polygon'+A({points:Gb[0]+','+Gb[1]+' '+Go[0]+','+Go[1]+' '+Gv[0]+','+Gv[1],fill:'rgba(60,203,142,0.06)',stroke:'none'})+'/>';
      s2+=rawln(Gb,Go,L2,8)+rawln(Gb,Gv,L1,8)+rawln(Go,Gv,L3,8);
      s2+='<path d="M '+(Gb[0]-25)+' '+Gb[1]+' L '+(Gb[0]-25)+' '+(Gb[1]-25)+' L '+Gb[0]+' '+(Gb[1]-25)+'" fill="none" stroke="rgba(60,203,142,.7)" stroke-width="2.8"/>';
      s2+=txXY((Go[0]+Gb[0])/2,Gb[1]+35,'√2',L2,30)+txXY(Gb[0]+20,(Gb[1]+Gv[1])/2+8,'1',L1,30,null,'start')+txXY((Go[0]+Gv[0])/2-20,(Go[1]+Gv[1])/2-8,'√3',L3,30);
      if(hl){ var P=hl==='o'?Go:hl==='v'?Gv:[(Go[0]+Gv[0])/2,(Go[1]+Gv[1])/2]; var pulse=0.45+0.55*(0.5+0.5*Math.sin(tt*2.0));
        s2+='<circle'+A({cx:P[0],cy:P[1],r:14,fill:'none',stroke:ANG,'stroke-width':4,opacity:pulse})+'/>'+'<circle'+A({cx:P[0],cy:P[1],r:5.5,fill:ANG,opacity:pulse})+'/>'; }
      s2+=txXY(ox+w/2,oy-w*0.7071-26,'the Lost Triangle  1 : √2 : √3',GMUT,22,'400','middle',true); return s2; }

    var lt=t%12, v=Vd.v, O=[0,0,0], foot=[v[0],v[1],0];
    var s='';
    var run=Math.hypot(v[0],v[1]), fh=[v[0]/run,v[1]/run,0];
    var azRad=Vd.az*Math.PI/180, altRad=Vd.alt*Math.PI/180;
    var runC=LC[Vd.run], riseC=LC[Vd.rise], hypC=LC['2'];
    var g=sm(lt,0.2,1.3); s+=ground(g);
    var azp=sm(lt,1.3,3.4); s+=seg(O,foot,azp,runC,8.5); s+=azArc(azRad,1.6,azp,ANG,0.9*azp);
    if(azp>0.55){ var am=proj([1.0*Math.cos(azRad/2),1.0*Math.sin(azRad/2),0]); s+=txXY(am[0],am[1]+12,Vd.az.toFixed(2)+'°  (xy)',ANGT,34,'600'); }
    var altp=sm(lt,3.4,5.4); s+=seg(foot,v,altp,riseC,8.5); s+=altArc(fh,altRad,2.4,altp,ANG,0.9*altp);
    if(altp>0.55){ var hm=proj([1.2*Math.cos(altRad/2)*fh[0],1.2*Math.cos(altRad/2)*fh[1],1.2*Math.sin(altRad/2)]); s+=txXY(hm[0]+15,hm[1],Vd.alt+'°  (z-rise)',ANGT,32,'600','start'); }
    var trp=sm(lt,5.4,7); if(trp>0) s+=poly([O,foot,v],'rgba(60,203,142,'+(0.13*trp)+')',1);
    var vecp=sm(lt,5.2,7); s+=seg(O,v,vecp,hypC,10); s+=rang(foot,O,v,'rgba(60,203,142,.8)',trp);
    var lp=sm(lt,7,8.6);
    if(lp>0){ s+=tx(mid(O,foot),0,40,Vd.run,runC,40,'600')+tx(mid(foot,v),40,5,Vd.rise,riseC,40,'600')+tx(mid(O,v),-40,-10,'2',hypC,40,'600')+tx(v,-5,45,Vd.angT,ANGT,32,'600'); }
    s+=dot(O,10,INK,g)+dot(foot,8.5,runC,azp)+dot(v,12,hypC,vecp);
    s+=drawLT(1565,250,175,Vd.hl,t);
    s+='<text x="70" y="118" fill="'+acc+'" font-size="50" font-weight="800" letter-spacing="-1" font-family="\'Syne\',sans-serif">'+es(Vd.tri)+'</text>';
    s+='<text x="70" y="1022" fill="rgba(240,237,232,.8)" font-size="33" font-style="italic" font-family="\'Cormorant Garamond\',serif">'+es('xy-plane angle '+Vd.az.toFixed(2)+'°  '+Vd.note)+'</text>';
    return s;
  }

  // --- buildFan ---
  function buildFan(t) {
    var el=22*Math.PI/180, PCX=920, PCY=660, PS=300;
    var AZ=-0.6+0.14*t;
    var INK='#F0EDE8', MUT='#8A8480';
    function proj(p){ var ce=Math.cos(AZ),se=Math.sin(AZ); var xa=p[0]*ce-p[1]*se,ya=p[0]*se+p[1]*ce,za=p[2]; var zb=ya*Math.sin(el)+za*Math.cos(el); return [PCX+xa*PS,PCY-zb*PS]; }
    function seg(p0,p1,prog,c,w,dash,op){ return lnXY(proj(p0),proj(p1),c,w,prog,dash,op); }
    function dot(p,r,c,op){ if(op<=0)return''; var P=proj(p); return '<circle'+A({cx:P[0],cy:P[1],r:r,fill:c,opacity:op})+'/>'; }
    function azArc2(azRad,r,prog,c,op){ var pts=[],n=20; for(var i=0;i<=n;i++){ var f=azRad*prog*i/n; pts.push(proj([r*Math.cos(f),r*Math.sin(f),0])); } return pl(pts,c,4,op); }
    function poly2(ps,fill,op){ return '<polygon'+A({points:ps.map(function(p){var P=proj(p);return P[0].toFixed(1)+','+P[1].toFixed(1);}).join(' '),fill:fill,stroke:'none',opacity:op})+'/>'; }
    function tx2(p,dx,dy,s,c,sz,wt,mono){ if(!p)return''; var P=proj(p); return '<text'+A({x:P[0]+dx,y:P[1]+dy,fill:c,'font-size':sz,'font-weight':wt||(mono?'400':'600'),'font-style':mono?'normal':'italic','font-family':fam(mono),'text-anchor':'middle'})+'>'+es(s)+'</text>'; }
    function ground(g){ var s2=poly2([[-2.2,-2.2,0],[2.2,-2.2,0],[2.2,2.2,0],[-2.2,2.2,0]],'rgba(240,237,232,0.03)',g*0.9);
      s2+=seg([0,0,0],[2.4,0,0],g,'rgba(240,237,232,0.22)',3)+seg([0,0,0],[0,2.4,0],g,'rgba(240,237,232,0.22)',3);
      s2+=tx2([2.4,0,0],20,10,'x',MUT,30,'400',true)+tx2([0,2.4,0],-25,5,'y',MUT,30,'400',true);
      s2+=seg([0,0,0],[0,0,2.4],g,'rgba(240,237,232,0.25)',2.5,'4 5')+tx2([0,0,2.4],-15,-20,'z',MUT,30,'400',true);
      s2+=tx2([-1.45,1.6,0],0,0,'xy-plane',MUT,24,'400',true); return s2; }

    var lt=t%12, O=[0,0,0];
    var s='';
    var g=sm(lt,0.2,1.3); s+=ground(g);
    var lift=sm(lt,4,7.5);
    V.forEach(function(d,i){ var v=d.v, c=ACC[i]; var azp=sm(lt,1.3,3.6);
      var tip=[v[0],v[1],v[2]*lift], foot=[v[0],v[1],0];
      s+=azArc2(d.az*Math.PI/180,1.3,azp,c,0.95*azp);
      s+=seg(O,tip,azp,c,7);
      if(lift>0) s+=lnXY(proj(tip),proj(foot),c,2,1,'6 6',0.5*lift);
      s+=dot(tip,10,c,azp);
    });
    if(lift>0.5){ V.forEach(function(d,i){ var tip=proj([d.v[0],d.v[1],d.v[2]]); s+=txXY(tip[0]+18,tip[1]-12,'|v|=2',ACC[i],28,'600','start'); }); }
    s+=dot(O,11,INK,g);

    var kx=1565, ky=220, rel=['= LT small angle','= bisector','= LT large angle'];
    s+=txXY(kx,ky-50,'AZIMUTH KEY','#8A8480',22,'700','start',true);
    V.forEach(function(d,i){ var yy=ky+i*58;
      s+=rawln([kx,yy],[kx+46,yy],ACC[i],8);
      s+=txXY(kx+62,yy+8,ANGS[i],INK,30,'600','start');
      s+=txXY(kx+210,yy+6,rel[i],'#8A8480',18,'400','start',true);
    });

    s+='<text x="70" y="118" fill="#C8A96E" font-size="50" font-weight="800" letter-spacing="-1" font-family="\'Syne\',sans-serif">THE FAN — three length-2 vectors</text>';
    var capt = lift<0.5 ? 'xy-plane angles   35.26°  <  45°  <  54.74°' : '…they stand up out of the xy-plane  (z-rise 30° · 45° · 30°)';
    s+='<text x="70" y="1022" fill="rgba(240,237,232,.8)" font-size="33" font-style="italic" font-family="\'Cormorant Garamond\',serif">'+es(capt)+'</text>';
    return s;
  }

  // --- Fit stage ---
  function fit() {
    state.vw = window.innerWidth;
    var s = Math.min(window.innerWidth/1920, window.innerHeight/1080);
    stage.style.transform = 'translate(-50%,-50%) scale('+s+')';
    var ns = state.vw<420?0.8:(state.vw<700?0.9:1);
    document.getElementById('ct-clips').style.transform = 'translateX(-50%) scale('+ns+')';
    document.getElementById('ct-bar').style.transform = 'translateX(-50%) scale('+ns+')';
  }

  // --- Render SVG ---
  function renderSVG() {
    var t = state.t, ci = state.clip;
    var acc = ci<3 ? ACC[ci] : '#C8A96E';
    var inner = defs() + '<g filter="url(#g)">';
    inner += ci<3 ? buildScene(V[ci], t, acc) : buildFan(t);
    inner += '</g>';
    svg.innerHTML = inner;
  }

  // --- Phase helpers ---
  function curPhase() {
    var t=state.t, ci=0;
    for(var i=0;i<PHASES.length;i++){ if(t>=PHASES[i].t-1e-6) ci=i; }
    return ci;
  }
  function goPhase(i) {
    state.t = PHASES[i].t; state.playing = false;
    save(state.t, state.clip); renderUI(); renderSVG();
  }
  function fmt(sec){ var s=Math.floor(sec); return '0:'+('0'+s).slice(-2); }

  // --- Render UI controls ---
  function renderUI() {
    var ci=state.clip, t=state.t, cp=curPhase();
    // Clip switcher
    var ch = '';
    V.forEach(function(d,i){
      var on=i===ci;
      ch+='<button onclick="setClip('+i+')" style="display:flex;flex-direction:column;align-items:flex-start;gap:2px;padding:7px 14px;border:none;border-radius:8px;cursor:pointer;transition:background .15s;background:'+(on?'rgba(200,169,110,.12)':'transparent')+';"><span style="font-family:\'Space Mono\',monospace;font-size:13px;font-weight:700;letter-spacing:.04em;color:'+(on?'#F0EDE8':'rgba(240,237,232,.55)')+';">0'+(i+1)+'</span><span style="font-family:\'Space Mono\',monospace;font-size:10px;letter-spacing:.02em;color:'+(on?ACC[i]:'rgba(240,237,232,.38)')+';">'+ANGS[i]+'</span></button>';
    });
    ch+='<button onclick="setClip(3)" style="display:flex;flex-direction:column;align-items:flex-start;gap:2px;padding:7px 14px;border:none;border-radius:8px;cursor:pointer;transition:background .15s;background:'+(ci===3?'rgba(200,169,110,.12)':'transparent')+';"><span style="font-family:\'Space Mono\',monospace;font-size:13px;font-weight:700;letter-spacing:.04em;color:'+(ci===3?'#F0EDE8':'rgba(240,237,232,.55)')+';">FAN</span><span style="font-family:\'Space Mono\',monospace;font-size:10px;letter-spacing:.02em;color:'+(ci===3?'#C8A96E':'rgba(240,237,232,.38)')+';">all three</span></button>';
    clipsEl.innerHTML = ch;

    // Playback bar
    var dots='';
    PHASES.forEach(function(p,i){
      var on=i===cp;
      dots+='<div onclick="goPhaseBtn('+i+')" title="'+p.label+'" style="display:flex;align-items:center;justify-content:center;width:22px;height:36px;cursor:pointer;"><div style="width:7px;height:7px;border-radius:50%;transition:transform .18s,background .18s;background:'+(on?'#C8A96E':'rgba(240,237,232,.12)')+';transform:'+(on?'scale(1.5)':'scale(1)')+';"></div></div>';
    });
    var scrubVal = Math.round(t/END*1000);
    barEl.innerHTML=
      '<button onclick="goPrev()" style="width:36px;height:36px;border:none;border-radius:9px;background:rgba(240,237,232,.06);color:#F0EDE8;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;">&#8249;</button>'+
      '<button onclick="togglePlay()" style="width:40px;height:40px;border:none;border-radius:9px;background:rgba(200,169,110,.16);color:#F0EDE8;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;">'+(state.playing?'&#10074;&#10074;':'&#9654;')+'</button>'+
      '<button onclick="goNext()" style="width:36px;height:36px;border:none;border-radius:9px;background:rgba(240,237,232,.06);color:#F0EDE8;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;">&#8250;</button>'+
      '<div style="width:1px;height:18px;background:rgba(240,237,232,.07);"></div>'+
      '<div style="display:flex;gap:3px;align-items:center;">'+dots+'</div>'+
      '<div style="width:1px;height:18px;background:rgba(240,237,232,.07);"></div>'+
      '<input class="ob-scrub" type="range" min="0" max="1000" value="'+scrubVal+'" oninput="onSeek(this.value)" style="width:200px;">'+
      '<span style="font-family:\'Space Mono\',monospace;font-size:11px;color:#8A8480;letter-spacing:.12em;min-width:70px;text-align:right;white-space:nowrap;">'+fmt(t)+' / 0:12</span>';
  }

  // Expose to inline handlers
  window.setClip = function(i){ state.clip=i; save(state.t,i); renderUI(); renderSVG(); };
  window.togglePlay = function(){ state.playing=!state.playing; renderUI(); };
  window.goPrev = function(){ goPhase(Math.max(0,curPhase()-1)); };
  window.goNext = function(){ goPhase(Math.min(PHASES.length-1,curPhase()+1)); };
  window.goPhaseBtn = function(i){ goPhase(i); };
  window.onSeek = function(val){ state.t=parseFloat(val)/1000*END; state.playing=false; save(state.t,state.clip); renderUI(); renderSVG(); };

  // RAF loop
  var last = performance.now();
  var saveThrottle = 0;
  function loop(now) {
    var dt = Math.min(0.05,(now-last)/1000); last=now;
    if(state.playing){
      state.t += dt;
      if(state.t >= END) state.t -= END;
      saveThrottle++;
      if(saveThrottle >= 15){ saveThrottle=0; save(state.t,state.clip); }
      renderUI();
    }
    renderSVG();
    requestAnimationFrame(loop);
  }

  // Init
  fit();
  renderUI();
  renderSVG();
  window.addEventListener('resize', fit);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
