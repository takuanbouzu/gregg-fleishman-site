<script>
(function(){
  "use strict";
  var root = null, currentPortrait = null;
  function isPortrait(){ return window.matchMedia('(max-aspect-ratio: 1/1)').matches; }
  function render(){
    var el = document.getElementById('lt-root');
    if (!el || !window.React || !window.ReactDOM || !window.LostTriangleVideoClean) return false;
    var portrait = isPortrait() && !!window.LostTriangleVideoCleanPortrait;
    var Comp = portrait ? window.LostTriangleVideoCleanPortrait : window.LostTriangleVideoClean;
    if (!root) { el.innerHTML = ''; root = ReactDOM.createRoot(el); }
    currentPortrait = portrait;
    root.render(React.createElement(Comp));
    return true;
  }
  if (!render()) {
    var tries = 0;
    var id = setInterval(function(){
      if (render() || ++tries > 200) clearInterval(id);
    }, 30);
  }
  var rt;
  window.addEventListener('resize', function(){
    clearTimeout(rt);
    rt = setTimeout(function(){ if (root && isPortrait() !== currentPortrait) render(); }, 150);
  });
})();
</script>
