<script type="module">
import * as THREE from 'three';
import { Line2 } from 'three/addons/lines/Line2.js';
import { LineGeometry } from 'three/addons/lines/LineGeometry.js';
import { LineMaterial } from 'three/addons/lines/LineMaterial.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

if (!window.WebGLRenderingContext) { document.getElementById('fallback').style.display = 'flex'; throw new Error('no webgl'); }

/* ---------- brand palette (matches GF_SCENE.dark / the site's geometry tokens) ---------- */
const COL = {
  bg:0x0B0B0B, bone:0xF0EDE8, dim:0x8A8480, gold:0xC8A96E,
  face:0x4A90D9, space:0xE0349E, green:0x3CCB8E
};
const HEX = { bone:'#F0EDE8', dim:'#8A8480', gold:'#C8A96E', face:'#4A90D9', space:'#E0349E', green:'#3CCB8E' };

/* ---------- renderer / scene / camera rig ---------- */
const stage = document.getElementById('stage');
const renderer = new THREE.WebGLRenderer({ antialias:true, preserveDrawingBuffer:true });
renderer.setClearColor(COL.bg, 1);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();

// gimbal-free rig: pivot Group at look-at target, camera child at (0,0,R)
const pivot = new THREE.Group();
scene.add(pivot);
const camera = new THREE.PerspectiveCamera(34, 1, 0.01, 100);
camera.position.set(0, 0, 3.7);
pivot.add(camera);

const TRI_CENTER = new THREE.Vector3(0.55, 0.40, 0.55);

let W = 1, H = 1;
const strokes = [];
function resize(){
  W = stage.clientWidth || window.innerWidth; H = stage.clientHeight || window.innerHeight;
  renderer.setSize(W, H);
  camera.aspect = W / H; camera.updateProjectionMatrix();
  strokes.forEach(s => s.mat.resolution.set(W, H));
}
window.addEventListener('resize', resize);
if (window.ResizeObserver){ new ResizeObserver(()=>{
  const w = stage.clientWidth, h = stage.clientHeight;
  if (w && h && (w!==W || h!==H)) resize();
}).observe(stage); }

/* ---------- progressive polyline helper ---------- */
// Always returns pts.length points so the LineGeometry buffer keeps a constant
// size (it sizes its instance buffer on first setPositions and won't grow later).
function partial(pts, t){
  const n = pts.length;
  if (t >= 1) return pts.map(p => p.clone());
  if (t <= 0) return pts.map(() => pts[0].clone());
  let total = 0; const seg = [];
  for (let i=1;i<n;i++){ const d = pts[i].distanceTo(pts[i-1]); seg.push(d); total += d; }
  const target = t*total; let acc = 0; let cutIdx = n-1; let cut = pts[n-1].clone();
  for (let i=1;i<n;i++){
    if (acc + seg[i-1] < target){ acc += seg[i-1]; }
    else { const r = (target-acc)/Math.max(seg[i-1],1e-9); cut = pts[i-1].clone().lerp(pts[i], r); cutIdx = i; break; }
  }
  const out = [];
  for (let i=0;i<n;i++) out.push(i < cutIdx ? pts[i].clone() : cut.clone());
  return out;
}

/* ---------- fat line stroke ---------- */
class Stroke {
  constructor(pts, color, width, opacity=1, ro=1){
    this.pts = pts;
    this.geom = new LineGeometry();
    this.mat = new LineMaterial({ color, linewidth:width, transparent:true, opacity });
    this.mat.resolution.set(W, H);
    this.line = new Line2(this.geom, this.mat);
    this.line.renderOrder = ro;
    this.line.frustumCulled = false;
    this.setProgress(0);
    strokes.push(this);
    scene.add(this.line);
  }
  setProgress(t){
    this._p = t;
    this.line.visible = t > 0.0008;
    const p = partial(this.pts, t); const arr = [];
    p.forEach(v => { arr.push(v.x, v.y, v.z); });
    this.geom.setPositions(arr);
  }
}
function S(pts, color, width, opacity, ro, bucket){
  const s = new Stroke(pts, color, width, opacity, ro);
  if (bucket) bucket.push(s.mat);
  return s;
}

/* ---------- polygon fill ---------- */
function F(pts, color, bucket){
  const g = new THREE.BufferGeometry(); const v = [];
  for (let i=1;i<pts.length-1;i++){
    v.push(pts[0].x,pts[0].y,pts[0].z, pts[i].x,pts[i].y,pts[i].z, pts[i+1].x,pts[i+1].y,pts[i+1].z);
  }
  g.setAttribute('position', new THREE.Float32BufferAttribute(v,3));
  const m = new THREE.MeshBasicMaterial({ color, transparent:true, opacity:0, side:THREE.DoubleSide, depthWrite:false });
  const mesh = new THREE.Mesh(g, m); mesh.renderOrder = -2;
  mesh.frustumCulled = false;
  scene.add(mesh);
  if (bucket) bucket.push(m);
  return m;
}

/* ---------- sprite text label ---------- */
function makeLabel(text, color, worldH=0.15){
  const font = '700 110px "Space Mono", monospace';
  const meas = document.createElement('canvas').getContext('2d'); meas.font = font;
  const pad = 24;
  const w = Math.ceil(meas.measureText(text).width) + pad*2;
  const h = 110 + pad*2;
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  const ctx = c.getContext('2d'); ctx.font = font; ctx.fillStyle = color;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, w/2, h/2);
  const tex = new THREE.CanvasTexture(c); tex.anisotropy = 8; tex.minFilter = THREE.LinearFilter;
  const mat = new THREE.SpriteMaterial({ map:tex, transparent:true, opacity:0, depthTest:false, depthWrite:false });
  const sp = new THREE.Sprite(mat);
  sp.scale.set(worldH * w/h, worldH, 1);
  sp.renderOrder = 30;
  return { sprite:sp, mat };
}
function L(text, color, pos, bucket, h=0.15){
  const { sprite, mat } = makeLabel(text, color, h);
  sprite.position.copy(pos); scene.add(sprite);
  if (bucket) bucket.push(mat);
  return mat;
}

/* ---------- 3D angle arc between two rays from c ---------- */
function arcPts(c,u,v,rad,seg){ u=u.clone().normalize(); v=v.clone().normalize();
  const ang=u.angleTo(v), axis=new THREE.Vector3().crossVectors(u,v).normalize(); const a=[];
  for(let i=0;i<=seg;i++){ const q=new THREE.Quaternion().setFromAxisAngle(axis,ang*i/seg);
    a.push(c.clone().add(u.clone().applyQuaternion(q).multiplyScalar(rad))); } return a; }

/* ======================================================= *
 *  GEOMETRY  (await fonts so label textures use Space Mono)
 * ======================================================= */
await document.fonts.ready;

const V = (x,y,z) => new THREE.Vector3(x,y,z);
const M = { ground:[], sq:[], tri:[], angle:[], constr:[] };

// key points of the construction (unit cube corner @ origin, ground = XZ plane)
const O  = V(0,0,0);
const E1 = V(1,0,0);
const Fc = V(1,0,1);   // far diagonal corner — ground run = √2
const E3 = V(0,0,1);
const B  = V(1,1,1);   // apex — end of the space diagonal √3

// faint ground plane + grid (context)
const groundFill = F([V(-1.2,0,-1.2),V(2.2,0,-1.2),V(2.2,0,2.2),V(-1.2,0,2.2)], COL.bone, M.ground);
const groundGrid = [];
for (let i=-1;i<=2;i++){
  groundGrid.push(S([V(i,0,-1.2),V(i,0,2.2)], COL.bone, 1.0, 0.10, 1, M.ground));
  groundGrid.push(S([V(-1.2,0,i),V(2.2,0,i)], COL.bone, 1.0, 0.10, 1, M.ground));
}

// the unit square on the ground (the module footprint)
const sq = S([O,E1,Fc,E3,O], COL.bone, 2.6, 0.9, 3, M.sq);
// the ground diagonal — the √2 run
const runLine = S([O,Fc], COL.face, 3.2, 1, 4, M.sq);

// the 35.25° elevation arc, lifting the diagonal off the ground toward the apex
const elevArc = S(arcPts(O, Fc.clone(), B.clone(), 0.46, 44), COL.gold, 2.2, 0.95, 6, M.angle);
// the space diagonal — √3 — and the unit vertical rise that closes the triangle
const diag = S([O,B], COL.space, 3.4, 1, 5, M.tri);
const leg  = S([Fc,B], COL.bone, 2.6, 1, 5, M.tri);
const triFill = F([O,Fc,B], COL.green, M.tri);

// 30° construction line (in the same vertical plane, beyond the space diagonal)
const planeN = new THREE.Vector3().crossVectors(Fc, V(0,1,0)).normalize();   // normal of the vertical plane through O–Fc
const obDir = B.clone().normalize();
let cDir = obDir.clone().applyQuaternion(new THREE.Quaternion().setFromAxisAngle(planeN, THREE.MathUtils.degToRad(30)));
if (cDir.y < obDir.y) cDir = obDir.clone().applyQuaternion(new THREE.Quaternion().setFromAxisAngle(planeN, THREE.MathUtils.degToRad(-30)));
const C30 = O.clone().add(cDir.clone().multiplyScalar(Math.sqrt(3)));
const constrLine = S([O, C30], COL.bone, 1.6, 0.42, 4, M.constr);
const constrArc  = S(arcPts(O, B.clone(), C30.clone(), 0.66, 44), COL.dim, 1.8, 0.85, 4, M.constr);

// labels
const lb_v2   = L('√2', HEX.face,  O.clone().lerp(Fc,0.5).add(V(0,0.05,0.16)),  M.sq,     0.15);
const lb_v3   = L('√3', HEX.space, O.clone().lerp(B,0.5).add(V(-0.22,0.05,0)),  M.tri,    0.15);
const lb_1    = L('1',  HEX.bone,  Fc.clone().lerp(B,0.5).add(V(0.17,0,0.05)),  M.tri,    0.14);
const bis1    = Fc.clone().normalize().add(B.clone().normalize()).normalize();
const lb_elev = L('35.25°', HEX.gold, O.clone().add(bis1.multiplyScalar(0.66)).add(V(0,0.02,0)), M.angle, 0.115);
const bis2    = B.clone().normalize().add(cDir.clone().normalize()).normalize();
const lb_30   = L('30°', HEX.dim, O.clone().add(bis2.multiplyScalar(0.92)), M.constr, 0.105);

/* ======================================================= *
 *  CAPTIONS
 * ======================================================= */
const capstack = document.getElementById('capstack');
function cap(html){ const d=document.createElement('div'); d.className='cap'; d.innerHTML=html; capstack.appendChild(d); return d; }
const C = {
  ground: cap("Start flat on the ground · <b>the unit square</b>"),
  run:    cap("Its diagonal — the run · <b>√2</b>"),
  tilt:   cap("Tilt up <b>35.25°</b> from the ground"),
  reach:  cap("…and you reach the space diagonal · <b>√3</b>"),
  close:  cap("Close it with the unit rise · <b>1</b>"),
  same:   cap("<b>The same Lost Triangle</b> · 1 : √2 : √3"),
  constr: cap("<b>30°</b> construction line"),
  end:    cap("Same triangle · arrived from the <b>35.25° ground angle</b>")
};

/* ======================================================= *
 *  MASTER TIMELINE
 * ======================================================= */
const tl = gsap.timeline({ paused:true });

const draws = [];
const easeFn = {};
function getEase(name){ return easeFn[name] || (easeFn[name] = gsap.parseEase(name)); }
function draw(stroke, start, dur=1.2, ease='power2.inOut'){
  draws.push({ stroke, start, dur, ease:getEase(ease) });
}
function drawMany(arr, start, dur, stagger=0, ease='power2.inOut'){
  arr.forEach((s,i)=>draw(s, start + i*stagger, dur, ease));
}
function updateDraws(t){
  for (const d of draws){
    let p = (t - d.start) / d.dur;
    p = p <= 0 ? 0 : p >= 1 ? 1 : d.ease(p);
    d.stroke.setProgress(p);
  }
}
function fade(mats, to, start, dur=0.8, ease='power1.inOut'){
  tl.to(mats,{opacity:to,duration:dur,ease},start);
}
function showCap(el, start, end){
  tl.to(el,{opacity:1,duration:0.45,ease:'power1.out'},start);
  tl.to(el,{opacity:0,duration:0.45,ease:'power1.in'},end-0.45);
}

/* lock initial camera state at t=0 so Replay/scrub-to-0 resets cleanly */
tl.set(pivot.rotation, { x:-0.42, y:0.60, z:0 }, 0);
tl.set(pivot.position, { x:TRI_CENTER.x, y:TRI_CENTER.y, z:TRI_CENTER.z }, 0);
tl.set(camera.position, { z:3.7 }, 0);

/* —— ground —— */
fade([groundFill], 0.05, 0.2, 1.0);
drawMany(groundGrid, 0.2, 0.8, 0.03);
draw(sq, 1.0, 1.1);
showCap(C.ground, 0.4, 2.6);

/* —— the √2 run —— */
draw(runLine, 2.6, 1.0); fade([lb_v2], 1, 3.2, 0.5);
showCap(C.run, 2.6, 4.2);

/* —— tilt up 35.25° —— */
draw(elevArc, 4.2, 0.7);
draw(diag, 4.5, 1.2);                                  // space diagonal sweeps up off the ground
fade([lb_elev], 1, 4.9, 0.5);
showCap(C.tilt, 4.2, 6.2);

/* —— reach √3 —— */
fade([triFill], 0.20, 5.8, 1.0);
fade([lb_v3], 1, 5.9, 0.5);
showCap(C.reach, 5.9, 7.6);

/* —— close with the unit rise —— */
draw(leg, 7.4, 0.9); fade([lb_1], 1, 7.9, 0.5);
showCap(C.close, 7.4, 9.0);
showCap(C.same, 9.2, 11.0);

/* —— 30° construction line —— */
draw(constrLine, 11.2, 1.0);
draw(constrArc, 11.5, 0.7);
fade([lb_30], 1, 11.9, 0.5);
showCap(C.constr, 11.2, 13.2);

/* —— slow orbit to confirm a real 3D right triangle standing on the ground —— */
tl.to(pivot.rotation, { y:1.08, x:-0.28, duration:5.0, ease:'sine.inOut' }, 13.4);
tl.to(camera.position, { z:3.9, duration:5.0, ease:'sine.inOut' }, 13.4);
showCap(C.end, 14.0, 18.2);
tl.to({}, { duration:0.6 }, 18.2);                     // tail

window.__tl = tl;
window.__seek = (t)=>{ tl.pause(); tl.time(t); updateDraws(t); renderer.render(scene, camera); };

/* ======================================================= *
 *  CONTROLS
 * ======================================================= */
const playBtn = document.getElementById('play');
const replayBtn = document.getElementById('replay');
const scrub = document.getElementById('scrub');
const speedSel = document.getElementById('speed');
const tlabel = document.getElementById('tlabel');
const orbitHint = document.getElementById('orbithint');
let scrubbing = false;

/* ---------- free orbit, handed off when the video ends ---------- */
const orbit = new OrbitControls(camera, renderer.domElement);
orbit.enableDamping = true; orbit.dampingFactor = 0.08;
orbit.enablePan = false; orbit.rotateSpeed = 0.75;
orbit.minDistance = 1.6; orbit.maxDistance = 9;
orbit.enabled = false;
let orbitMode = false;
function enableOrbit(){
  if (orbitMode) return;
  orbitMode = true;
  scene.attach(camera);              // reparent, preserving current world transform
  orbit.target.copy(TRI_CENTER);
  orbit.enabled = true; orbit.update();
  orbitHint.classList.add('show');
}
function disableOrbit(){
  if (!orbitMode) return;
  orbitMode = false;
  orbit.enabled = false;
  pivot.add(camera);                 // back under the animation rig
  camera.position.set(0,0,3.7);
  camera.quaternion.identity();
  orbitHint.classList.remove('show');
}
tl.eventCallback('onComplete', enableOrbit);

function setPlayIcon(){ playBtn.textContent = tl.paused() ? '▶ Play' : '❙❙ Pause'; }
playBtn.addEventListener('click', ()=>{
  if (orbitMode){ disableOrbit(); tl.restart(); setPlayIcon(); return; }
  tl.paused() ? tl.play() : tl.pause(); setPlayIcon();
});
replayBtn.addEventListener('click', ()=>{ disableOrbit(); tl.restart(); setPlayIcon(); });
scrub.addEventListener('input', ()=>{ disableOrbit(); scrubbing=true; tl.pause(); tl.progress(scrub.value/1000); setPlayIcon(); });
scrub.addEventListener('change', ()=>{ scrubbing=false; });
speedSel.addEventListener('change', ()=>{ tl.timeScale(parseFloat(speedSel.value)); });

/* ======================================================= *
 *  RENDER LOOP
 * ======================================================= */
gsap.ticker.add(()=>{
  if (orbitMode){ orbit.update(); }
  else { updateDraws(tl.time()); }
  if (!scrubbing){ scrub.value = (tl.progress()*1000)|0; }
  tlabel.textContent = (tl.time()).toFixed(1) + 's';
  renderer.render(scene, camera);
});

/* ---------- boot ---------- */
resize();
tl.play();
setPlayIcon();
</script>
</body>
</html>
