<style>
  /* ============================================================
     THE LOST TRIANGLE · MOTION — "Lightbox Broadside"
     A 1920×1080 paper artifact, autoplaying, centred and scaled
     on a dark/contemporary gallery wall that flips with the theme.
     Captions sit on the paper (ink); gold is the only chrome signal.
     ============================================================ */
  :root{
    --lt-display:'Archivo',var(--font-display),sans-serif;
    --lt-mono2:'IBM Plex Mono',var(--font-mono),monospace;
    --lt-wall:radial-gradient(120% 120% at 50% 0%,#1A160F 0%,#0B0B0B 100%);
    --lt-artifact:0 44px 130px rgba(0,0,0,.62),0 0 0 1px rgba(200,169,110,.14);
    --lt-track:rgba(240,237,232,.16);
  }  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; overflow:hidden; color:var(--tx);
    background:var(--lt-wall); background-attachment:fixed;
    font-family:'Source Serif 4',Georgia,serif;
    transition:background .5s var(--ease), color .5s var(--ease);
  }

  /* gold clock signal — one pass of the loop */
  .lt-progress{position:fixed;top:0;left:0;right:0;height:2px;background:var(--lt-track);z-index:80;}
  .lt-progress>div{height:100%;width:0;background:var(--accent);}

  .lt-stage{
    position:fixed; left:50%; top:50%; width:1920px; height:1080px;
    transform-origin:center center; transform:translate(-50%,-50%);
    background:#F6F4EE; color:#1C1A16; box-shadow:var(--lt-artifact);
    cursor:pointer; touch-action:none; user-select:none;
  }
  .lt-stage canvas{position:absolute;inset:0;width:1920px;height:1080px;display:block;}

  .lt-idx{position:absolute;top:52px;right:64px;font-family:var(--lt-mono2);font-size:19px;
    letter-spacing:.16em;text-transform:uppercase;color:rgba(28,26,22,.4);pointer-events:none;}
  .lt-cap{position:absolute;left:64px;bottom:78px;max-width:1140px;pointer-events:none;transition:opacity .25s;}
  .lt-cap .kicker{font-family:var(--lt-mono2);font-size:22px;letter-spacing:.24em;text-transform:uppercase;color:rgba(28,26,22,.55);margin-bottom:14px;}
  .lt-cap .title{font-family:var(--lt-display);font-weight:800;font-size:88px;line-height:.94;letter-spacing:-.022em;text-transform:uppercase;color:#1C1A16;}
  .lt-cap .formula{font-family:var(--lt-mono2);font-size:30px;letter-spacing:.02em;color:rgba(28,26,22,.72);margin-top:18px;}

  .lt-state{position:absolute;left:64px;bottom:40px;display:flex;align-items:center;gap:12px;
    font-family:var(--lt-mono2);font-size:17px;letter-spacing:.16em;text-transform:uppercase;color:rgba(28,26,22,.5);pointer-events:none;}
  .lt-state .dot{width:9px;height:9px;border-radius:50%;background:#1C1A16;}
  .lt-state.paused .dot{background:transparent;border:1.5px solid #1C1A16;}

  .lt-hint{position:absolute;right:64px;bottom:78px;display:flex;align-items:center;gap:12px;
    font-family:var(--lt-mono2);font-size:17px;letter-spacing:.16em;text-transform:uppercase;
    color:rgba(28,26,22,.5);transition:opacity .5s;pointer-events:none;}
  .lt-hint .ic{width:32px;height:32px;border:1.4px solid rgba(28,26,22,.5);border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:15px;}

  /* sibling links, on the wall */
  .lt-walklinks{position:fixed;left:0;right:0;bottom:0;z-index:50;display:flex;justify-content:center;
    gap:22px;padding:16px;pointer-events:none;}
  .lt-walklinks a{font-family:var(--lt-mono2);font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--tx-dim);text-decoration:none;pointer-events:auto;transition:color .15s var(--ease);}
  .lt-walklinks a:hover{color:var(--accent);}
  html.gf-cover #gfnav,html.gf-cover .lt-progress,html.gf-cover .lt-walklinks,html.gf-cover .lt-idx,html.gf-cover .lt-cap,html.gf-cover .lt-state,html.gf-cover .lt-hint{display:none!important;}

<div class="lt-stage" id="ltStage">
  <canvas id="ltCanvas"></canvas>
  <div class="lt-idx" id="ltIdx">—</div>
  <div class="lt-cap" id="ltCap">
    <div class="kicker" id="ltKicker"></div>
    <div class="title" id="ltTitle"></div>
    <div class="formula" id="ltFormula"></div>
  </div>
  <div class="lt-state" id="ltState"><span class="dot"></span><span id="ltStateLabel">Playing</span></div>

</div>

<script>
(function () {
  function boot() {
    var canvas = document.getElementById('ltCanvas');
    var stage  = document.getElementById('ltStage');
    if (!canvas || typeof LostTriangle === 'undefined') { return setTimeout(boot, 40); }

    var eng = new LostTriangle(canvas, { mode: 'loop', interactive: true, captions: false, frame: true });
    var DUR = eng.DUR, bounds = [0, 4.4, 9.8, 14.0, 34.0, DUR];
    var els = {
      idx: document.getElementById('ltIdx'), kicker: document.getElementById('ltKicker'),
      title: document.getElementById('ltTitle'), formula: document.getElementById('ltFormula'),
      prog: document.getElementById('ltProg'), cap: document.getElementById('ltCap'),
      hint: document.getElementById('ltHint'), state: document.getElementById('ltState'),
      stateLabel: document.getElementById('ltStateLabel')
    };
    var last = {};
    function setText(node, t) { if (last[node] !== t) { els[node].textContent = t; last[node] = t; } }

    eng.onScene(function (s, T) {
      setText('idx', s.i); setText('kicker', s.kicker); setText('title', s.title); setText('formula', s.formula);
      els.prog.style.width = (T / DUR * 100).toFixed(2) + '%';
      var capA = 1;
      for (var i = 0; i < bounds.length; i++) {
        var d = Math.min(Math.abs(T - bounds[i]), DUR - Math.abs(T - bounds[i]));
        if (d < 0.5) capA = Math.min(capA, d / 0.5);
      }
      els.cap.style.opacity = capA.toFixed(3);
      var in3d = (T >= 4.4 && T < 10.4) || (T >= 14.0 && T < 34.6);
      els.hint.style.opacity = (!eng._interacted && in3d && !eng.paused) ? '1' : '0';
      var paused = eng.paused;
      els.state.className = 'lt-state' + (paused ? ' paused' : '');
      setText('stateLabel', paused ? 'Paused' : 'Playing');
    });

    function fit() {
      var pad = 64;
      var k = Math.min(window.innerWidth / 1920, (window.innerHeight - pad) / 1080);
      var cover = document.documentElement.classList.contains('gf-cover');
      stage.style.left = cover ? '64%' : '50%';
      stage.style.top  = cover ? '52%' : '50%';
      stage.style.transform = 'translate(-50%,-50%) scale(' + k + ')';
    }
    window.addEventListener('resize', fit); fit();
    eng.start();
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
</script>
