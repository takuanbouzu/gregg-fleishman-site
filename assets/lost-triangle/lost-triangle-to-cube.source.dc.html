<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&amp;family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&amp;family=Space+Grotesk:wght@300;400;500&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet">
<style>
  html, body { margin:0; background:#0B0B0B; }
  .lt-scrub { -webkit-appearance:none; appearance:none; height:4px; border-radius:3px; background:rgba(240,237,232,.14); outline:none; }
  .lt-scrub::-webkit-slider-thumb { -webkit-appearance:none; width:15px; height:15px; border-radius:50%; background:#C8A96E; cursor:pointer; box-shadow:0 0 0 4px rgba(200,169,110,.16); }
  .lt-scrub::-moz-range-thumb { width:15px; height:15px; border:none; border-radius:50%; background:#C8A96E; cursor:pointer; }
  @keyframes pulse-glow { 0%,100%{ box-shadow:0 0 0 0 rgba(200,169,110,.0), 0 0 24px rgba(200,169,110,.18); } 50%{ box-shadow:0 0 0 8px rgba(200,169,110,.08), 0 0 40px rgba(200,169,110,.30); } }
  @keyframes wythoff-draw { from{ stroke-dashoffset:600; } to{ stroke-dashoffset:0; } }
</style>
</helmet>

<div data-screen-label="Lost Triangle" style="position: fixed; inset: 0; background: #0B0B0B; overflow: hidden">
  <div ref="{{ stageRef }}" style="position: absolute; left: 50%; top: 50%; width: 1920px; height: 1080px; transform: translate(-50%,-50%); transform-origin: center center">
    <div style="position:absolute; inset:0; background:radial-gradient(ellipse 72% 64% at 50% 44%, #16140F 0%, #0E0E0D 54%, #0B0B0B 100%);"></div>

    {{ scene }}

    <!-- Wythoff triangle diagram — fades in at transition -->
    

    <!-- CTA / transition panel -->
    <div style="position: absolute; left: 50%; bottom: 270px; transform: translateX(-50%); opacity: {{ ctaOp }}; transition: opacity 1.4s ease; text-align: center; pointer-events: {{ ctaPointer }}; white-space: nowrap">
      <div style="font-family:'Cormorant Garamond',serif; font-size:18px; letter-spacing:.22em; text-transform:uppercase; color:#8A8480; margin-bottom:22px;">The triangle becomes the joint</div>
      <a href="Fleishman Cube Assembly - Standalone.html" style="display:inline-block; font-family:'Syne',sans-serif; font-size:16px; font-weight:700; letter-spacing:.28em; text-transform:uppercase; color:#C8A96E; text-decoration:none; border:1px solid rgba(200,169,110,.45); border-radius:3px; padding:16px 44px; background:rgba(200,169,110,.06); animation:pulse-glow 3s ease-in-out infinite; transition:background .3s,border-color .3s;">Explore the Cube Model →</a>
      <div style="margin-top:20px; font-family:'Space Grotesk',sans-serif; font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:rgba(138,132,128,.5);">Six parts · The whole of space</div>
    </div>

    <!-- Playback bar -->
    <div style="position: absolute; left: 964px; transform: translateX(-50%); display: flex; align-items: center; gap: 18px; padding: 11px 20px; border-radius: 14px; background: rgba(18,18,18,.66); backdrop-filter: blur(10px); border: 1px solid rgba(240,237,232,.07); box-shadow: 0 8px 30px rgba(0,0,0,.5); opacity: {{ uiOpacity }}; transition: opacity .8s; font-family: 'Space Grotesk',sans-serif; top: 990px; width: 351px; height: 27px; text-align: left">
      <button onclick="{{ toggle }}" style="width:40px; height:40px; border:none; border-radius:10px; background:rgba(200,169,110,.16); color:#F0EDE8; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center;">{{ playIcon }}</button>
      <button onclick="{{ restart }}" style="width:36px; height:36px; border:none; border-radius:10px; background:rgba(240,237,232,.06); color:#8A8480; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center;">↻</button>
      <span style="font-size:12px; color:#8A8480; font-variant-numeric:tabular-nums; min-width:40px; text-align:right; letter-spacing:0.04em;">{{ tlabel }}</span>
      <input class="lt-scrub" type="range" min="0" max="1000" value="{{ scrubVal }}" oninput="{{ onSeek }}" style="width:360px;">
      <span style="font-size:12px; color:#8A8480; font-variant-numeric:tabular-nums; letter-spacing:0.04em;">{{ durlabel }}</span>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:720},&quot;autoplay&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  constructor(props){
    super(props);
    this.END = 88;
    this.S = 92; this.cx = 960; this.cy = 600; this.el = 26*Math.PI/180; this.GU = 1.6;
    this.az0 = -32*Math.PI/180;
    this.C = {
      grid:'#4A90D9', axis:'#4A90D9', cyan:'#4A90D9', red:'#E0349E',
      gold:'#C8A96E', white:'#F0EDE8', green:'#3CCB8E',
      titleCyan:'#7FB2E6', titleRed:'#F05BB5', titleGold:'#D8BE8F',
      labelCyan:'#A9CDEE', labelRed:'#F58FCF', labelGold:'#E3D0AC',
      magenta:'#E0349E', titleMag:'#F05BB5', labelMag:'#F58FCF'
    };
    const g=this.GU, r2=Math.sqrt(2);
    this.P = {
      O:[0,0,0], U:[g,0,0], Dg:[g,g,0], T:[g,g,r2*g],
      MU:[-g,0,0], MDg:[-g,g,0], P2:[-g,g,r2*g]
    };
    this.grid=[]; const N=5;
    for(let i=-N;i<=N;i++){ this.grid.push([[i,-N,0],[i,N,0]]); this.grid.push([[-N,i,0],[N,i,0]]); }
    this.circle=[]; const R=3.4;
    for(let k=0;k<=64;k++){ const a=2*Math.PI*k/64; this.circle.push([R*Math.cos(a),R*Math.sin(a),0]); }
    this.state = { t:0, playing:false };
  }

  componentDidMount(){
    const saved=parseFloat(localStorage.getItem('lt_t'));
    if(!isNaN(saved) && saved>0 && saved<this.END) this.setState({t:saved});
    else if(this.props.autoplay) this.setState({playing:true});
    else this.setState({playing:true});
    this.fit(); this._fit=()=>this.fit(); window.addEventListener('resize',this._fit);
    this._last=performance.now();
    const loop=(now)=>{
      const dt=(now-this._last)/1000; this._last=now;
      if(this.state.playing){
        let nt=this.state.t+dt;
        if(nt>=this.END){ nt=this.END; this.setState({t:nt,playing:false}); }
        else this.setState({t:nt});
        if(Math.floor(nt*4)!==this._sv){ this._sv=Math.floor(nt*4); localStorage.setItem('lt_t', nt.toFixed(2)); }
      }
      this._raf=requestAnimationFrame(loop);
    };
    this._raf=requestAnimationFrame(loop);
  }

  componentWillUnmount(){ cancelAnimationFrame(this._raf); window.removeEventListener('resize',this._fit); }

  fit(){
    if(!this.stage) return;
    const s=Math.min(window.innerWidth/1920, window.innerHeight/1080);
    this.stage.style.transform=`translate(-50%,-50%) scale(${s})`;
  }

  sm(t,a,b){ if(b<=a) return t>=b?1:0; let e=(t-a)/(b-a); e=e<0?0:e>1?1:e; return e*e*(3-2*e); }
  fio(t,a,b,c,d){ return this.sm(t,a,b)*(1-this.sm(t,c,d)); }

  proj(p){
    const a=this._az, ce=Math.cos(a), se=Math.sin(a);
    const xa=p[0]*ce-p[1]*se, ya=p[0]*se+p[1]*ce, za=p[2];
    const zb=ya*Math.sin(this.el)+za*Math.cos(this.el);
    return [this.cx+xa*this.S, this.cy-zb*this.S];
  }

  lerpP(A,B,k){ return [A[0]+(B[0]-A[0])*k, A[1]+(B[1]-A[1])*k]; }
  lerpP3(a,b,k){ return [a[0]+(b[0]-a[0])*k, a[1]+(b[1]-a[1])*k, a[2]+(b[2]-a[2])*k]; }

  seg(p0,p1,prog,color,w,o={}){
    const key='s'+(this._k++); if(prog<=0) return null;
    const A=this.proj(p0), B0=this.proj(p1); const B=this.lerpP(A,B0,prog);
    return React.createElement('line',{key,x1:A[0],y1:A[1],x2:B[0],y2:B[1],stroke:color,strokeWidth:w,strokeLinecap:'round',
      strokeDasharray:o.dash, opacity:o.op==null?1:o.op, filter:o.glow===false?undefined:'url(#g)'});
  }

  dot(p,rad,color,op){
    const key='c'+(this._k++); if(op<=0) return null;
    const P=this.proj(p);
    return React.createElement('circle',{key,cx:P[0],cy:P[1],r:rad,fill:color,opacity:op,filter:'url(#g)'});
  }

  lab(p,txt,color,op,o={}){
    const key='l'+(this._k++); if(op<=0) return null;
    const P=this.proj(p);
    return React.createElement('text',{key,x:P[0]+(o.dx||0),y:P[1]+(o.dy||0),fill:color,opacity:op,fontSize:o.size||30,
      fontFamily:"'Cormorant Garamond',serif",fontStyle:o.italic?'italic':'normal',fontWeight:o.w||600,textAnchor:o.anchor||'middle',filter:'url(#g)'},txt);
  }

  txt(x,y,s,color,op,o={}){
    const key='x'+(this._k++); if(op<=0) return null;
    return React.createElement('text',{key,x,y,fill:color,opacity:op,fontSize:o.size||34,
      fontFamily:o.face||"'Cormorant Garamond',serif",fontStyle:o.italic?'italic':'normal',
      fontWeight:o.w||500,textAnchor:o.anchor||'middle',filter:o.glow?'url(#g)':undefined,letterSpacing:o.ls||0},s);
  }

  arc(O3,A3,B3,rad,prog,color,op){
    const key='a'+(this._k++); if(prog<=0||op<=0) return null;
    const O=this.proj(O3),A=this.proj(A3),B=this.proj(B3);
    let aA=Math.atan2(A[1]-O[1],A[0]-O[0]), aB=Math.atan2(B[1]-O[1],B[0]-O[0]);
    let d=aB-aA; while(d>Math.PI)d-=2*Math.PI; while(d<-Math.PI)d+=2*Math.PI;
    const aE=aA+d*prog;
    const x0=O[0]+rad*Math.cos(aA),y0=O[1]+rad*Math.sin(aA),x1=O[0]+rad*Math.cos(aE),y1=O[1]+rad*Math.sin(aE);
    return React.createElement('path',{key,d:`M${x0} ${y0} A${rad} ${rad} 0 0 ${d>0?1:0} ${x1} ${y1}`,
      stroke:color,strokeWidth:2.4,fill:'none',strokeDasharray:'5 6',opacity:op,filter:'url(#g)',strokeLinecap:'round'});
  }

  renderVals(){
    const t=this.state.t, C=this.C, P=this.P, k=[]; this._k=0;

    const ROT0=72, ROT1=84;
    this._az = this.az0 + (t>ROT0 ? 2*Math.PI*this.sm(t,ROT0,ROT1) : 0);

    const push=(e)=>{ if(e) k.push(e); };

    // defs (glow)
    push(React.createElement('defs',{key:'d'},
      React.createElement('filter',{id:'g',x:'-60%',y:'-60%',width:'220%',height:'220%'},
        React.createElement('feGaussianBlur',{stdDeviation:2.4,result:'b'}),
        React.createElement('feMerge',null,
          React.createElement('feMergeNode',{in:'b'}),
          React.createElement('feMergeNode',{in:'SourceGraphic'})))));

    // GRID
    const gOp=this.sm(t,0.5,4)*0.12;
    this.grid.forEach((s,i)=> push(React.createElement('line',Object.assign({key:'gr'+i},
      (()=>{const A=this.proj(s[0]),B=this.proj(s[1]);return {x1:A[0],y1:A[1],x2:B[0],y2:B[1]};})(),
      {stroke:C.grid,strokeWidth:1,opacity:gOp}))));

    // rotation ground circle (final)
    const cOp=this.fio(t,72.5,73.5,85.5,87)*0.5;
    if(cOp>0){ const pts=this.circle.map(p=>this.proj(p));
      push(React.createElement('polyline',{key:'circ',
        points:pts.map(p=>p[0]+','+p[1]).join(' '),fill:'none',stroke:C.green,strokeWidth:1.5,strokeDasharray:'4 9',opacity:cOp})); }

    // AXES
    push(React.createElement('g',{key:'ax'},
      this.seg([-5,0,0],[5,0,0], this.sm(t,4,6.2), C.axis,1.6, {glow:true, op:0.40}),
      this.seg([0,-5,0],[0,5,0], this.sm(t,5.4,7.6), C.axis,1.6, {glow:true, op:0.40}),
      this.dot(P.O,3.5,C.axis,this.sm(t,5.8,6.6)*0.6)));

    // filled Lost Triangle
    { const fop=this.sm(t,63.5,65.2)*0.34; if(fop>0){
      const Os=this.proj(P.O),Ts=this.proj(P.T),Ds=this.proj(P.Dg);
      push(React.createElement('polygon',{key:'fillTri',
        points:`${Os[0]},${Os[1]} ${Ts[0]},${Ts[1]} ${Ds[0]},${Ds[1]}`,
        fill:`rgba(60,203,142,${fop*0.8})`,stroke:'none'})); } }

    // II. 45° diagonal
    const B=[0,this.GU,0];
    push(this.seg(P.O,P.U,  this.sm(t,8.4,9.2),  C.cyan,1.8, {glow:true}));
    push(this.seg(P.U,P.Dg, this.sm(t,9.0,9.8),  C.cyan,1.8, {glow:true}));
    push(this.seg(P.Dg,B,   this.sm(t,9.6,10.4), C.cyan,1.8, {glow:true}));
    push(this.seg(B,P.O,    this.sm(t,10.2,11.0),C.cyan,1.8, {glow:true}));
    { const dop=this.sm(t,10.6,11.2);
      push(this.dot(P.O,3.6,C.cyan,dop)); push(this.dot(P.U,3.6,C.cyan,dop));
      push(this.dot(P.Dg,3.6,C.cyan,dop)); push(this.dot(B,3.6,C.cyan,dop)); }
    { const o1=this.sm(t,10.8,11.4);
      push(this.lab(this.lerpP3(B,P.Dg,0.5),'1',C.labelCyan,o1,{dy:-14,size:27,italic:true}));
      push(this.lab(this.lerpP3(P.O,P.U,0.5),'1',C.labelCyan,o1,{dy:24,size:27,italic:true})); }
    push(this.seg(P.O,P.Dg, this.sm(t,11.4,12.9), C.cyan,2.6, {dash:'10 9', glow:true}));
    push(this.lab(this.lerpP3(P.O,P.Dg,0.6),'\u221a2',C.labelCyan,this.sm(t,12.9,13.5),{dy:26,dx:8,size:30,italic:true}));
    push(this.arc(P.O,P.U,P.Dg, 40, this.sm(t,13.3,14.0), C.cyan, this.sm(t,13.3,14.0)*0.85));
    push(this.lab(this.lerpP3(P.O,P.Dg,0.17),'45°',C.labelCyan,this.sm(t,14.0,14.5),{dy:18,dx:6,size:21,italic:true}));

    // III. The Rise
    { const rStart=18.1, rEnd=19.0, rp=this.sm(t,rStart,rEnd), tip=this.lerpP3(P.Dg,P.T,rp);
      push(this.seg(P.Dg,P.T, rp, C.magenta,11, {glow:false, op:0.22}));
      push(this.seg(P.Dg,P.T, rp, C.magenta,3.4, {glow:false}));
      push(this.dot(tip,4.6,C.magenta, this.sm(t,rStart,rStart+0.25)));
      push(this.lab(this.lerpP3(P.Dg,P.T,0.5),'\u221a2',C.labelMag, this.sm(t, rStart+0.7*(rEnd-rStart), rEnd), {dx:26,size:30,italic:true})); }

    // IV. Sundial
    push(this.seg(P.O,P.T, this.sm(t,27.6,29.5), C.gold,3.4, {glow:true}));
    push(this.dot(P.T,5,C.gold,this.sm(t,29.4,30)));
    push(this.lab(P.T,'T',C.titleGold,this.sm(t,29.6,30.2),{dx:26,dy:-10,size:34}));
    push(this.lab(this.lerpP3(P.O,P.T,0.5),'2',C.labelGold,this.sm(t,28.4,29.6),{dx:-22,size:34,w:600}));
    push(this.txt(960,886,'Floor diagonal \u221a2  +  rise \u221a2  \u2192  the sundial line', C.white, this.fio(t,30,31,38,38.8),{size:36,italic:true}));

    // V. Lost Triangle
    push(this.seg(P.O,P.U, this.sm(t,38.6,39.7), C.cyan,3, {glow:true}));
    push(this.seg(P.U,P.T, this.sm(t,40,41.5), C.white,2.4, {dash:'7 7', glow:true}));
    { const o=this.sm(t,41.5,42.1);
      push(this.lab(this.lerpP3(P.O,P.U,0.5),'1',C.labelCyan,o,{dy:26,size:28}));
      push(this.lab(this.lerpP3(P.U,P.T,0.55),'\u221a3','#3CCB8E',o,{dx:26,size:30,italic:true})); }
    push(this.txt(960,886,'The Lost Triangle:  sides  1,  \u221a3,  2', C.titleGold, this.fio(t,42.5,43.5,49,49.8),{size:40,italic:true}));
    push(this.txt(960,922,'a 30\u201360\u201390 right triangle, seen edge-on', C.white, this.fio(t,43.5,44.3,49,49.8),{size:30,italic:true}));

    // VI. Mirror Sundial
    push(this.seg(P.O,P.MDg, this.sm(t,49.6,50.8), C.cyan,2.6, {glow:true}));
    push(this.seg(P.MDg,P.P2, this.sm(t,51,52.4), C.magenta,3, {glow:true}));
    push(this.seg(P.O,P.P2, this.sm(t,52.6,54.2), C.magenta,3.4, {glow:true}));
    push(this.dot(P.P2,5,C.magenta,this.sm(t,54,54.6)));
    push(this.lab(P.P2,'P\u2082',C.titleMag,this.sm(t,54.2,54.8),{dx:-14,dy:-22,size:34,italic:true}));
    push(this.lab(this.lerpP3(P.O,P.P2,0.5),'2',C.labelMag,this.sm(t,52.8,54),{dx:-22,size:32,w:600}));

    // VII. 120° Revelation
    { const Os=this.proj(P.O), Ts=this.proj(P.T), Ps=this.proj(P.P2);
      let aA=Math.atan2(Ts[1]-Os[1],Ts[0]-Os[0]), aB=Math.atan2(Ps[1]-Os[1],Ps[0]-Os[0]);
      let d=aB-aA; while(d>Math.PI)d-=2*Math.PI; while(d<-Math.PI)d+=2*Math.PI;
      const prog=this.sm(t,60,61.8), aE=aA+d*prog, vis=this.fio(t,60,61.6,86,87.5), rW=128, sweep=d>0?1:0;
      if(vis>0){
        const x0=Os[0]+rW*Math.cos(aA),y0=Os[1]+rW*Math.sin(aA),x1=Os[0]+rW*Math.cos(aE),y1=Os[1]+rW*Math.sin(aE);
        push(React.createElement('path',{key:'wedge',d:`M${Os[0]} ${Os[1]} L${x0} ${y0} A${rW} ${rW} 0 0 ${sweep} ${x1} ${y1} Z`,fill:'rgba(224,52,158,0.14)',stroke:'none',opacity:vis}));
        push(React.createElement('path',{key:'warc',d:`M${x0} ${y0} A${rW} ${rW} 0 0 ${sweep} ${x1} ${y1}`,fill:'none',stroke:C.red,strokeWidth:3.6,opacity:vis,filter:'url(#g)',strokeLinecap:'round'}));
      }
      const fr=this.sm(t,61.5,63.6); if(fr>0&&fr<1){
        push(React.createElement('circle',{key:'flash',cx:Os[0],cy:Os[1],r:26+fr*250,fill:'none',stroke:C.red,strokeWidth:4*(1-fr),opacity:(1-fr)*0.85,filter:'url(#g)'})); }
      const am=(aA+aE)/2, lp=[Os[0]+(rW+62)*Math.cos(am), Os[1]+(rW+62)*Math.sin(am)];
      const appear=this.sm(t,61.8,62.7), sc=(0.55+0.45*appear)*(1+0.05*Math.sin(t*3.2)), lop=this.fio(t,61.8,62.5,86,87.5);
      if(lop>0){
        push(React.createElement('circle',{key:'glow120',cx:lp[0],cy:lp[1]-18,r:70,fill:C.red,opacity:lop*0.18,filter:'url(#g)'}));
        push(React.createElement('text',{key:'t120',x:lp[0],y:lp[1],fill:C.titleRed,opacity:lop,fontSize:72,fontWeight:600,
          fontFamily:"'Cormorant Garamond',serif",textAnchor:'middle',filter:'url(#g)',
          transform:`translate(${lp[0]} ${lp[1]}) scale(${sc}) translate(${-lp[0]} ${-lp[1]})`},'120°')); } }

    // right-angle marker
    { const rop=this.sm(t,64,65.4); if(rop>0){
      const D=this.proj(P.Dg), Tp=this.proj(P.T), Up=this.proj(P.U);
      const v1=[Tp[0]-D[0],Tp[1]-D[1]], v2=[Up[0]-D[0],Up[1]-D[1]];
      const n1=Math.hypot(v1[0],v1[1])||1, n2=Math.hypot(v2[0],v2[1])||1, s=15;
      const a=[D[0]+v1[0]/n1*s, D[1]+v1[1]/n1*s], b=[D[0]+v2[0]/n2*s, D[1]+v2[1]/n2*s], c=[a[0]+v2[0]/n2*s, a[1]+v2[1]/n2*s];
      push(React.createElement('path',{key:'rang',d:`M ${a[0]} ${a[1]} L ${c[0]} ${c[1]} L ${b[0]} ${b[1]}`,fill:'none',stroke:'rgba(60,203,142,.65)',strokeWidth:2,opacity:rop})); } }

    // math block
    const mOp=this.fio(t,63,64.4,71,71.8); const mx=86;
    push(this.txt(mx,742,'OP\u2081 = (1, 1, \u221a2),   |OP\u2081| = 2', C.white, mOp,{size:34,italic:true,anchor:'start'}));
    push(this.txt(mx,798,'OP\u2082 = (\u22121, 1, \u221a2),   |OP\u2082| = 2   (mirror)', C.white, mOp,{size:34,italic:true,anchor:'start'}));
    push(this.txt(mx,854,'cos \u03b8 = (\u22121 + 1 + 2) / 4 = 1/2   \u27f9   \u03b8 = 60°', C.white, mOp,{size:34,italic:true,anchor:'start'}));
    push(this.txt(mx,912,'supplement:  180° \u2212 60° = 120°   (hexagon corner)', C.titleRed, mOp,{size:34,italic:true,anchor:'start',w:600}));

    // Final statements
    push(this.txt(960,900,'The Lost Triangle defines the Fleishman joint\u2019s 120° dihedral angle.', C.white, this.sm(t,75,76.4),{size:44,italic:true,glow:true}));
    push(this.txt(960,950,'gregg fleishman', 'rgba(138,132,128,.85)', this.sm(t,77,78),{size:28,italic:true}));

    // Callout box — bottom right
    { const bop=this.fio(t,70,72,86,87.5);
      if(bop>0){
        push(React.createElement('g',{key:'callout',opacity:bop},
          React.createElement('rect',{x:1650,y:1000,width:240,height:60,rx:12,fill:'rgba(224,52,158,.08)',stroke:'rgba(224,52,158,.4)',strokeWidth:2}),
          React.createElement('text',{x:1770,y:1018,textAnchor:'middle',fontSize:'13px',fontFamily:"'Space Mono',monospace",fill:'#E0349E',letterSpacing:'.08em'},'120° DIHEDRAL'),
          React.createElement('text',{x:1770,y:1045,textAnchor:'middle',fontSize:'11px',fontFamily:"'Space Grotesk',sans-serif",fill:'rgba(240,237,232,.65)',letterSpacing:'.04em'},'Hexagon corner angle')
        ));
      }
    }

    // Chapter captions
    push(this.txt(960,914,'A flat floor of unit squares \u2014 each cell is 1 \u00d7 1', C.white, this.fio(t,3.2,4.2,7.2,7.9),{size:34,italic:true}));
    push(this.txt(960,914,'A unit square\u2019s diagonal is \u221a2', C.white, this.fio(t,15,15.8,17.3,18),{size:34,italic:true}));
    push(this.txt(960,914,'Rise straight up by \u221a2', C.white, this.fio(t,21.5,22.3,26.3,27),{size:34,italic:true}));
    push(this.txt(960,914,'Mirror the sundial across the upright plane', C.white, this.fio(t,55,55.8,58.4,59),{size:34,italic:true}));

    // TITLE
    const chapters=[[0,'I. The Plane',C.titleCyan],[8,'II. The 45° Diagonal',C.titleCyan],[18,'III. The Rise',C.titleRed],
      [27,'IV. The Sundial Line',C.titleGold],[38,'V. The Lost Triangle',C.titleGold],[49,'VI. The Mirror Sundial',C.titleCyan],[59,'VII. The 120° Revelation',C.red]];
    let act=chapters[0]; for(const c of chapters){ if(t>=c[0]) act=c; }
    push(this.txt(72,158,act[1],act[2],this.sm(t,act[0],act[0]+0.7),{size:52,anchor:'start',glow:true,w:800,face:"'Syne',sans-serif",ls:-1}));



    const scene = React.createElement('svg',{viewBox:'0 0 1920 1080',width:'100%',height:'100%',style:{position:'absolute',inset:0,display:'block'}}, k);

    // Transition CTA fades in at the end
    const ctaOp = this.sm(t, 84.5, 87);
    // Wythoff diagram opacity
    const wythOp = this.sm(t, 85, 87);
    // Controls fade out when CTA arrives
    const uiOpacity = 1 - this.sm(t, 85, 87) * 0.82;

    const mm=Math.floor(t/60), ss=Math.floor(t%60), dm=Math.floor(this.END/60), ds=Math.floor(this.END%60);

    return {
      scene,
      stageRef:(el)=>{ this.stage=el; if(el) this.fit(); },
      playIcon: this.state.playing ? '❚❚' : '►',
      toggle: ()=>{ if(this.state.t>=this.END) this.setState({t:0,playing:true}); else this.setState(s=>({playing:!s.playing})); },
      restart: ()=>{ this.setState({t:0,playing:true}); },
      onSeek: (e)=>{ const v=parseFloat(e.target.value)/1000*this.END; this.setState({t:v,playing:false}); localStorage.setItem('lt_t',v.toFixed(2)); },
      scrubVal: Math.round(t/this.END*1000),
      tlabel: mm+':'+String(ss).padStart(2,'0'),
      durlabel: dm+':'+String(ds).padStart(2,'0'),
      uiOpacity,
      ctaOp,
      ctaPointer: ctaOp > 0.1 ? 'auto' : 'none',
      wythOp,
    };
  }
}
