<title>INS_05 — cut the corners</title>

<body>
<script type="module">
import * as K from '../shared/insert-kit.js';
const { THREE } = K;

const FRAMES = 188;           // 02:38.492 → 02:44.765
const st = K.stage({ frames: FRAMES, width: 848, height: 448 });
const { scene, camera, width: W, height: H } = st;
K.groundGrid(scene, -1.7, 10, 20);

const k = 0.5;   // octahedron vertices at 3k = 1.5; truncation u=1 lands on the TO exactly
const wire = new THREE.LineSegments(new THREE.BufferGeometry(),
  new THREE.LineBasicMaterial({ color: K.COL.unit, transparent: true }));
scene.add(wire);

// Six gold cut planes, one per octahedron vertex, sweeping in along the axes.
const planes = [];
for (const ax of [[1,0,0],[0,1,0],[0,0,1]]) for (const s of [1,-1]) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(1, 1),
    new THREE.MeshBasicMaterial({ color: K.COL.angle, transparent: true, opacity: 0,
      side: THREE.DoubleSide, depthWrite: false }));
  const n = new THREE.Vector3(...ax).multiplyScalar(s);
  m.lookAt(n);
  m.userData.n = n;
  scene.add(m); planes.push(m);
}

const faces = K.toFaces(k); scene.add(faces);
const lbl = K.domLabel('truncated octahedron', { size: 12 });
const cap = K.caption('cut the corners — an Archimedean solid');

function pose(t) {
  const born = K.ease(K.seg(t, 0.15, 1.0));
  const u = K.ease(K.seg(t, 1.3, 4.3));
  wire.geometry.setFromPoints(K.truncationWirePositions(k, u));
  wire.material.opacity = born;
  const done = K.seg(t, 4.3, 5.1);

  for (const p of planes) {
    p.position.copy(p.userData.n).multiplyScalar((3 - u) * k);
    p.scale.setScalar(0.25 + 1.15 * u);
    p.material.opacity = 0.30 * born * K.seg(u, 0.02, 0.15) * (1 - done);
  }
  K.setOp(faces, done);

  lbl.at(new THREE.Vector3(0, 1.95, 0), camera, W, H);
  lbl.op(K.seg(t, 4.6, 5.3));
  cap.op(K.seg(t, 4.8, 5.5));
  K.orbit(camera, 0.7 + t * 0.20, 0.36, 4.7, new THREE.Vector3(0, 0.05, 0));
}
K.expose(st, pose);
</script>
</body>
