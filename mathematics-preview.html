<style>
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{background:#0B0B0B;color:var(--tx);font-family:var(--font-ui);-webkit-font-smoothing:antialiased;overflow:hidden;}

  /* Native-app feel on mobile browsers: no rubber-band overscroll or
     pull-to-refresh under the animations, no double-tap-zoom delay on the
     controls, no grey tap-highlight flash, no accidental text selection
     of UI chrome. Pinch-zoom of the page stays available (accessibility). */
  html,body{ overscroll-behavior:none; }
  body{ -webkit-tap-highlight-color:transparent; }
  button, input[type="range"]{ touch-action:manipulation; }
  #pv-bar, #pv-hint, #pv-restore{ -webkit-user-select:none; user-select:none; }

  /* The stage sits BELOW the selector bar — its top is inset by the bar's
     measured height (--pv-bar-h, kept current in JS), so no slide can ever
     underlap the chips. When chrome is hidden the inset drops to 0 and the
     slide goes full-bleed. Each slide fits itself to this box. */
  #pv-stage{ position:fixed; top:var(--pv-bar-h, 52px); left:0; right:0; bottom:0; z-index:1; background:#0B0B0B; transition:top .35s ease; }
  #pv-stage > *{ height:100%; }

  /* Floating selector bar over the top of the stage. */
  #pv-bar{
    position:fixed; left:0; right:0; top:0; z-index:20;
    display:flex; align-items:center; gap:16px; flex-wrap:wrap;
    padding:calc(10px + env(safe-area-inset-top, 0px)) calc(18px + env(safe-area-inset-right, 0px)) 10px calc(18px + env(safe-area-inset-left, 0px));
    background:linear-gradient(180deg, rgba(11,11,11,.86) 0%, rgba(11,11,11,.66) 62%, rgba(11,11,11,0) 100%);
    backdrop-filter:blur(6px);
    pointer-events:none; /* let clicks fall through the gradient; children re-enable */
    transition:opacity .35s ease;
  }
  #pv-bar.hidden{ opacity:0; }
  #pv-bar.hidden, #pv-bar.hidden *{ pointer-events:none; } /* invisible bar mustn't intercept clicks */
  #pv-bar > *{ pointer-events:auto; }

  /* When chrome is hidden the bar (and its toggle) vanish, so a small always-on
     handle stays in the corner to bring the chrome back — otherwise the only way
     back is the H key. */
  #pv-restore{
    position:fixed; right:14px; top:12px; z-index:40; display:none;
    width:30px; height:30px; align-items:center; justify-content:center;
    border:1px solid rgba(240,237,232,.16); border-radius:50%;
    background:rgba(11,11,11,.5); backdrop-filter:blur(6px);
    color:rgba(240,237,232,.5); font-size:15px; line-height:1; cursor:pointer;
    transition:opacity .25s ease, color .18s ease, border-color .18s ease;
  }
  #pv-restore.show{ display:flex; }
  #pv-restore:hover{ color:#F0EDE8; border-color:rgba(240,237,232,.42); background:rgba(11,11,11,.7); }

  .pv-brand{
    font-family:'Space Mono',monospace; font-size:10px; letter-spacing:.22em; text-transform:uppercase;
    color:rgba(200,169,110,.72); white-space:nowrap; user-select:none;
  }
  .pv-brand b{ display:block; color:#F0EDE8; font-weight:700; letter-spacing:.14em; }

  #pv-chips{ display:flex; gap:7px; flex-wrap:wrap; flex:1 1 auto; }
  .pv-chip{
    appearance:none; border:1px solid rgba(240,237,232,.12); background:rgba(240,237,232,.05);
    color:rgba(240,237,232,.72); font-family:'Space Grotesk',sans-serif; font-size:12.5px; font-weight:400;
    letter-spacing:.01em; padding:7px 13px; border-radius:11px; cursor:pointer; white-space:nowrap;
    transition:background .18s ease, color .18s ease, border-color .18s ease;
  }
  .pv-chip:hover{ color:#F0EDE8; border-color:rgba(240,237,232,.28); background:rgba(240,237,232,.09); }
  .pv-chip:active{ transform:scale(.96); }
  /* Comfortable thumb targets on touch devices (Apple HIG ~44px) */
  @media (pointer:coarse){
    .pv-chip{ min-height:42px; padding:10px 15px; }
    #pv-toggle{ min-height:38px; }
    #pv-restore{ width:38px; height:38px; }
  }
  .pv-chip.active{
    color:#0B0B0B; background:#C8A96E; border-color:#C8A96E; font-weight:500;
    box-shadow:0 4px 18px rgba(200,169,110,.28);
  }
  .pv-chip .pv-num{ opacity:.5; font-size:10.5px; margin-right:5px; }
  .pv-chip.active .pv-num{ opacity:.7; }

  #pv-hint{
    position:fixed; right:18px; bottom:14px; z-index:20;
    font-family:'Space Mono',monospace; font-size:10px; letter-spacing:.10em; text-transform:uppercase;
    color:rgba(138,132,128,.5); pointer-events:none; text-align:right; transition:opacity .35s ease;
  }
  #pv-hint.hidden{ opacity:0; }
  /* Embedded full-app slides (The Cube, Vector Pod) carry their own on-screen
     hints, so suppress the preview's bottom hint to avoid two stacked. */
  #pv-hint.pv-off{ display:none; }

  /* Chrome-hide toggle (rides in the bar, far right) */
  #pv-toggle{
    flex:0 0 auto; align-self:center;
    appearance:none; border:1px solid rgba(240,237,232,.14); background:rgba(11,11,11,.55);
    color:rgba(240,237,232,.6); font-family:'Space Mono',monospace; font-size:10px; letter-spacing:.08em;
    text-transform:uppercase; padding:6px 10px; border-radius:9px; cursor:pointer; backdrop-filter:blur(6px);
    white-space:nowrap;
  }
  #pv-toggle:hover{ color:#F0EDE8; border-color:rgba(240,237,232,.3); }

  #pv-loading{
    position:fixed; inset:0; z-index:5; display:flex; align-items:center; justify-content:center;
    color:rgba(240,237,232,.4); font-family:'Space Mono',monospace; font-size:12px; letter-spacing:.14em;
    text-transform:uppercase; pointer-events:none;
  }

  @media (max-width:720px){
    /* Compact two-row bar: [brand … hide-chrome] over a single scrollable chip strip. */
    #pv-bar{ gap:6px 10px; padding:calc(8px + env(safe-area-inset-top, 0px)) 10px 10px; }
    .pv-brand{ order:1; font-size:9px; }
    #pv-toggle{ order:2; margin-left:auto; }
    #pv-chips{
      order:3; flex:1 1 100%;
      flex-wrap:nowrap; overflow-x:auto; overflow-y:hidden;
      -webkit-overflow-scrolling:touch; scrollbar-width:none;
      padding-bottom:2px; scroll-padding:0 12px;
    }
    #pv-chips::-webkit-scrollbar{ display:none; }
    .pv-chip{ flex:0 0 auto; font-size:12.5px; padding:8px 12px; }
    #pv-hint{ display:none; }
  }
  /* Short / landscape phone: height is scarce, so collapse to ONE row —
     scrollable chips + toggle, no brand, no caption. Placed after the
     max-width block so it wins when both match. */
  @media (max-height:520px){
    #pv-bar{ flex-wrap:nowrap; gap:10px; padding:6px calc(10px + env(safe-area-inset-right, 0px)) 6px calc(10px + env(safe-area-inset-left, 0px)); }
    .pv-brand{ display:none; }
    #pv-chips{
      order:0; flex:1 1 auto;
      flex-wrap:nowrap; overflow-x:auto; overflow-y:hidden;
      -webkit-overflow-scrolling:touch; scrollbar-width:none; padding-bottom:0;
    }
    #pv-chips::-webkit-scrollbar{ display:none; }
    #pv-toggle{ order:0; margin-left:0; }
    #pv-hint{ display:none; }
  }

</style>
</head>
<body>

<div id="pv-stage"><div id="pv-loading">loading…</div></div>

<div id="pv-bar">
  <span class="pv-brand">Gregg Fleishman<b>Animation Preview</b></span>
  <div id="pv-chips"></div>
  <button id="pv-toggle" title="hide / show chrome (press H)">hide chrome</button>
</div>
<div id="pv-hint">← → switch&nbsp;·&nbsp;H hide chrome</div>
<button id="pv-restore" title="show chrome (H)" aria-label="show chrome">⋯</button>

<script>
(function(){
  "use strict";

  // Registry of candidate animations. Every 16:9 slide is iframe-hosted
  // (preview-slide.html wraps the plain-React ones) so each is isolated and
  // gets its own correctly-sized viewport.
  // `kind:'three'` mounts a Three.js scene module directly (any aspect) —
  // `module` is the ES module path, `mountFn` the exported mount function name.
  var REG = [
    { id:'intro',      label:'Three Angles',
      kind:'iframe', src:'assets/lost-triangle/lt-intro.html' },

    { id:'proof',      label:'The Fleishman Sequence',
      kind:'iframe', src:'preview-slide.html?s=proof' },

    { id:'drawings',   label:'With Drawings',
      kind:'iframe', src:'fleishman-sequence-drawings.html?embed=1' },

    { id:'paper',      label:'The Paper',
      kind:'iframe', src:'assets/lost-triangle/lt-paper.html' },

    { id:'device',     label:'The Device',
      kind:'iframe', src:'preview-slide.html?s=device' },

    { id:'risez',      label:'Rise-Z',
      kind:'iframe', src:'preview-slide.html?s=risez' },

    { id:'house',      label:'The Vector House',
      kind:'three', module:'./assets/lost-triangle/vector-house-scene.js', mountFn:'mountVectorHouseScene' },

    { id:'cube',       label:'The Cube',
      kind:'iframe', src:'explore.html?embed=1', ownChrome:true },

    { id:'pod',        label:'Vector Pod',
      kind:'iframe', src:'vector-pod/index.html', ownChrome:true },

    { id:'rhomipod',   label:'Rhomi Pod',
      kind:'three', module:'./assets/lost-triangle/rhomi-pod-scene.js', mountFn:'mountRhomiPodScene' }
  ];

  var stage   = document.getElementById('pv-stage');
  var chipsEl = document.getElementById('pv-chips');
  var bar     = document.getElementById('pv-bar');
  var hint    = document.getElementById('pv-hint');
  var toggle  = document.getElementById('pv-toggle');
  var restore = document.getElementById('pv-restore');

  var curRoot = null;     // active ReactDOM root
  var curDispose = null;  // active Three.js dispose()
  var curId = null;

  function clearStage(){
    if (curDispose){ try{ curDispose(); }catch(_){} curDispose = null; }
    if (curRoot){ try{ curRoot.unmount(); }catch(_){} curRoot = null; }
    stage.innerHTML = '';
  }

  function show(id){
    var item = null;
    for (var i=0;i<REG.length;i++){ if (REG[i].id === id) item = REG[i]; }
    if (!item) item = REG[0];
    if (item.id === curId) return;
    curId = item.id;

    clearStage();
    var mount = document.createElement('div');
    mount.style.height = '100%';
    stage.appendChild(mount);

    if (item.kind === 'iframe'){
      var f = document.createElement('iframe');
      f.src = item.src;
      f.title = item.label;
      f.style.cssText = 'width:100%;height:100%;border:0;display:block;background:#0B0B0B;';
      mount.appendChild(f);
    } else if (item.kind === 'three'){
      var loading = document.createElement('div');
      loading.id = 'pv-loading';
      loading.textContent = 'loading model…';
      stage.appendChild(loading);
      import(item.module)
        .then(function(m){
          if (curId !== item.id) return;      // switched away while loading
          if (loading.parentNode) loading.parentNode.removeChild(loading);
          curDispose = m[item.mountFn](mount);
        })
        .catch(function(err){
          loading.textContent = 'model failed to load';
          console.error('[preview] ' + item.id + ':', err);
        });
    }

    // Update chrome
    hint.classList.toggle('pv-off', !!item.ownChrome);   // suppress our hint over full-app slides
    Array.prototype.forEach.call(chipsEl.children, function(c){
      var on = c.dataset.id === item.id;
      c.classList.toggle('active', on);
      // keep the active chip visible in the mobile scroll strip
      if (on && c.scrollIntoView) { try { c.scrollIntoView({ inline: 'center', block: 'nearest' }); } catch (_) { c.scrollIntoView(); } }
    });
    if (location.hash.slice(1) !== item.id) history.replaceState(null, '', '#' + item.id);
  }

  // Build chips
  REG.forEach(function(item, i){
    var b = document.createElement('button');
    b.className = 'pv-chip';
    b.dataset.id = item.id;
    b.innerHTML = '<span class="pv-num">' + (i+1) + '</span>' + item.label;
    b.addEventListener('click', function(){ show(item.id); });
    chipsEl.appendChild(b);
  });

  // Keep the stage's top inset equal to the bar's height so nothing underlaps
  // the chips. Zero it when chrome is hidden so the slide fills the screen.
  // The bar wraps to 1–2 rows responsively, so measure rather than hard-code.
  function measureBar(){
    var h = chromeHidden ? 0 : bar.offsetHeight;
    document.documentElement.style.setProperty('--pv-bar-h', h + 'px');
  }
  window.addEventListener('resize', measureBar);
  window.addEventListener('orientationchange', measureBar);
  window.addEventListener('load', measureBar);   // fonts can change bar height

  // Chrome hide/show
  var chromeHidden = false;
  function setChrome(hidden){
    chromeHidden = hidden;
    bar.classList.toggle('hidden', hidden);
    hint.classList.toggle('hidden', hidden);
    restore.classList.toggle('show', hidden);   // small corner handle stays when chrome is hidden
    toggle.textContent = hidden ? 'show chrome' : 'hide chrome';
    measureBar();
  }
  toggle.addEventListener('click', function(){ setChrome(!chromeHidden); });
  restore.addEventListener('click', function(){ setChrome(false); });

  // Keyboard: arrows switch, H toggles chrome, digits jump
  window.addEventListener('keydown', function(ev){
    if (ev.target && /^(INPUT|TEXTAREA)$/.test(ev.target.tagName)) return;
    var idx = REG.findIndex(function(r){ return r.id === curId; });
    if (ev.key === 'ArrowRight'){ show(REG[(idx+1) % REG.length].id); }
    else if (ev.key === 'ArrowLeft'){ show(REG[(idx-1+REG.length) % REG.length].id); }
    else if (ev.key === 'h' || ev.key === 'H'){ setChrome(!chromeHidden); }
    else if (/^[1-9]$/.test(ev.key)){ var n = parseInt(ev.key,10)-1; if (REG[n]) show(REG[n].id); }
  });

  // Initial selection from the URL hash, else the first entry.
  measureBar();
  var start = location.hash.slice(1);
  if (!REG.some(function(r){ return r.id === start; })) start = REG[0].id;
  show(start);
  window.addEventListener('hashchange', function(){
    var h = location.hash.slice(1);
    if (REG.some(function(r){ return r.id === h; })) show(h);
  });
})();
</script>
</body>
