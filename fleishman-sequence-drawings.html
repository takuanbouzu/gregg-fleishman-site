<script>
(function(){
  "use strict";
  var cover = /[?&]cover\b/.test(location.search);
  var root = null, currentPortrait = null;
  function isPortrait(){
    return window.matchMedia('(max-aspect-ratio: 1/1)').matches;
  }
  // Choose the layout-appropriate component: the design ships a portrait
  // build (1080x1920) alongside the landscape one (1920x1080). Mounting the
  // landscape component on a phone letterboxes it into a tiny center strip.
  function render(){
    var el = document.getElementById('lt-root');
    if (!el || !window.React || !window.ReactDOM || !window.LostTriangleMarried) return false;
    var portrait = isPortrait() && !!window.LostTriangleMarriedPortrait;
    var Comp = portrait ? window.LostTriangleMarriedPortrait : window.LostTriangleMarried;
    if (!root) { el.innerHTML = ''; root = ReactDOM.createRoot(el); }
    currentPortrait = portrait;
    root.render(React.createElement(Comp, cover ? { controls: false, loop: true } : null));
    return true;
  }
  if (!render()) {
    // Scripts may still be evaluating; poll briefly until globals are ready.
    var tries = 0;
    var id = setInterval(function(){
      if (render() || ++tries > 200) clearInterval(id);
    }, 30);
  }
  // Re-pick the component when the aspect ratio crosses square (rotate /
  // resize). Both orientations share one Stage persistKey ("animstage-married"),
  // so the playhead carries across the switch automatically.
  var rt;
  window.addEventListener('resize', function(){
    clearTimeout(rt);
    rt = setTimeout(function(){
      if (root && isPortrait() !== currentPortrait) render();
    }, 150);
  });
})();
</script>
