<style>
  :root{ --ring:rgba(240,237,232,.42); }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{background:var(--bg);color:var(--tx);font-family:var(--font-ui);-webkit-font-smoothing:antialiased;}

  /* Tab bar */
  #con-tabs{
    position:fixed; top:56px; left:0; right:0; z-index:15;
    height:40px; display:flex; align-items:stretch;
    background:var(--bg-surface); border-bottom:1px solid var(--border);
  }
  .con-tab-btn{
    flex:1; font-family:var(--font-mono); font-size:10px; letter-spacing:.1em;
    text-transform:uppercase; color:var(--tx-dim); background:transparent;
    border:none; border-bottom:2px solid transparent; cursor:pointer;
    transition:color .16s,border-color .16s;
  }
  .con-tab-btn:hover{ color:var(--tx); }
  .con-tab-btn.active{ color:var(--tx); border-bottom-color:var(--accent); }

  /* Sections */
  .con-section{
    position:fixed; inset:0; top:56px; overflow:hidden;
  }

  /* c2d section — the exact 2D construction, embedded from lost-triangle.html */
  #con-c2d{ overflow:hidden; background:#08080c; }
  #c2d-frame{ position:absolute; inset:0; width:100%; height:100%; border:0; display:block; }

  /* cls fullscreen styles */
  #cs-stage{ position:absolute; inset:0; z-index:0; }
  #cs-stage canvas{ display:block; }

  #cs-capwrap{
    position:absolute; left:0; right:0; bottom:96px; z-index:6;
    display:flex; justify-content:center; pointer-events:none; height:30px;
  }
  .cs-capstack{
    position:relative; width:min(86vw,760px); height:30px; text-align:center;
  }
  .cap{
    position:absolute; left:0; right:0; top:0; opacity:0;
    font-family:var(--font-mono); font-size:14px; letter-spacing:.06em; color:var(--tx-dim);
    text-wrap:balance; line-height:1.4;
  }
  .cap b{ color:var(--accent); font-weight:700; }

  #cs-controls{
    position:absolute; left:0; right:0; bottom:0; z-index:7;
    display:flex; align-items:center; gap:18px;
    padding:18px 30px 22px;
    background:linear-gradient(to top,var(--bg),transparent);
  }
  #cs-controls button, #cs-controls select{
    font-family:var(--font-mono); font-size:12px; letter-spacing:.08em;
    background:transparent; color:var(--tx); border:1px solid var(--border-strong);
    border-radius:2px; padding:8px 12px; cursor:pointer; text-transform:uppercase;
    transition:border-color .2s,color .2s;
  }
  #cs-controls button:hover, #cs-controls select:hover{
    border-color:var(--accent); color:var(--accent);
  }
  #cs-scrub{
    flex:1; -webkit-appearance:none; appearance:none; height:2px;
    background:var(--border-strong); border-radius:2px; cursor:pointer;
  }
  #cs-scrub::-webkit-slider-thumb{
    -webkit-appearance:none; appearance:none; width:12px; height:12px;
    border-radius:50%; background:var(--accent); cursor:pointer; border:none;
  }
  .tlabel{ font-family:var(--font-mono); font-size:11px; color:var(--tx-dim); min-width:38px; text-align:center; }

  /* Fallback */
  #cs-fallback{
    position:absolute; inset:0; z-index:50; display:none; align-items:center;
    justify-content:center; padding:32px; text-align:center;
    background:var(--bg); color:var(--tx-dim); font-family:var(--font-ui);
  }
  #cs-fallback .in{ max-width:440px; }
  #cs-fallback h2{
    font-family:var(--font-display); font-weight:800; color:var(--tx); font-size:22px; margin:0 0 12px;
  }
  #cs-fallback p{ font-size:14px; line-height:1.6; margin:0; }
  #cs-fallback a{
    color:var(--accent); text-decoration:none;
    border-bottom:1px solid color-mix(in srgb,var(--accent) 40%,transparent);
  }

  /* cls titlecard */
  #cs-titlecard{
    position:absolute; inset:0; z-index:8; display:flex; flex-direction:column;
    align-items:center; justify-content:flex-end; gap:12px; padding:0 24px 9vh;
    pointer-events:none; opacity:0;
    background:linear-gradient(to top,var(--bg) 9%, color-mix(in srgb, var(--bg) 66%, transparent) 26%, transparent 48%);
  }
  #cs-titlecard .kicker{
    font-family:var(--font-mono); font-size:12px; letter-spacing:.42em;
    text-transform:uppercase; color:var(--accent);
  }
  #cs-titlecard h1{
    font-family:var(--font-display); font-weight:800; letter-spacing:-.01em;
    font-size:clamp(32px,6.4vw,72px); line-height:.98; text-align:center;
    color:var(--tx); text-transform:uppercase;
  }
  #cs-titlecard .sub{
    font-family:var(--font-mono); font-size:13px; letter-spacing:.30em;
    text-transform:uppercase; color:var(--tx-dim);
  }
</style>
</head>

</div>
