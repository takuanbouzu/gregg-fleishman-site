<script>
(function(){
  "use strict";
  var root = null;
  // The design is one 1920x1080 component that scales to fit its box (it
  // letterboxes on portrait, exactly as the original export does).
  function render(){
    var el = document.getElementById('lt-root');
    if (!el || !window.React || !window.ReactDOM || !window.LostTriangleAnimation) return false;
    if (!root) { el.innerHTML = ''; root = ReactDOM.createRoot(el); }
    root.render(React.createElement(window.LostTriangleAnimation, { autoplay: true }));
    return true;
  }
  if (!render()) {
    var tries = 0;
    var id = setInterval(function(){
      if (render() || ++tries > 200) clearInterval(id);
    }, 30);
  }
})();
</script>

<script>
(function(){
  "use strict";
  var root3 = null, currentPortrait3 = null;
  function isPortrait(){ return window.matchMedia('(max-aspect-ratio: 1/1)').matches; }
  function render3(){
    var el = document.getElementById('lt-root-3');
    if (!el || !window.React || !window.ReactDOM || !window.LostTriangleVideoClean) return false;
    var portrait = isPortrait() && !!window.LostTriangleVideoCleanPortrait;
    var Comp = portrait ? window.LostTriangleVideoCleanPortrait : window.LostTriangleVideoClean;
    if (!root3) { root3 = ReactDOM.createRoot(el); }
    currentPortrait3 = portrait;
    root3.render(React.createElement(Comp));
    return true;
  }
  if (!render3()) {
    var tries = 0;
    var id = setInterval(function(){
      if (render3() || ++tries > 200) clearInterval(id);
    }, 30);
  }
  var rt;
  window.addEventListener('resize', function(){
    clearTimeout(rt);
    rt = setTimeout(function(){ if (root3 && isPortrait() !== currentPortrait3) render3(); }, 150);

})();
